board:
  id: tmc2209_pen_laser_v2
  name: "TMC2209 Pen/Laser CNC Controller V2"
  manufacturer: "Dring Engineering Services"
  mcu_chip: esp32
  family: "FluidNC Pen/Laser Controller"
  revision: "V2"
  status: active

meta:
  wiki_url: "http://wiki.fluidnc.com/en/hardware/official/TMC2209_Pen_Laser_V2"
  vendor_docs_url: "https://www.elecrow.com/tmc2209-pen-laser-fluidnc-cnc-controller.html"
  purchase_url: "https://www.tindie.com/products/33366583/tmc2209-penlaser-cnc-controller/"
  schematic_url: "https://oshwlab.com/bdring/tmc2130-2-axis_copy_copy_copy_copy"
  notes: >
    2-axis (X/Y) controller for pen plotters, laser cutter/engravers, and
    sand plotters, plus an RC-servo Z output for a pen-lift mechanism.
    70mm x 70mm, USB-C (CP2102, main 12-30VDC power via terminal block must
    be on for USB to enumerate -- no reverse-polarity protection). Onboard
    ESP32 module, 2x onboard TMC2209 UART stepper drivers (max ~2.0A,
    optional StallGuard sensorless homing), microSD socket, I/O expansion
    port for a display/pendant.

stepping:
  engines: [rmt, timed]
  notes: "Motor pins are native GPIO (no I2SO shift register on this board), so RMT/Timed are both physically possible; wiki's own example config uses engine: RMT."

fixed_peripherals:
  spi:
    miso_pin: gpio.19
    mosi_pin: gpio.23
    sck_pin: gpio.18
  sdcard:
    cs_pin: gpio.5
  dedicated_uarts:
    - label: "TMC2209 UART"
      txd_pin: gpio.17
      rxd_pin: gpio.16
      baud: 115200
      mode: "8N1"
      notes: >
        Single UART bus, entirely internal, addressing BOTH onboard
        TMC2209 chips (X at addr 0, Y at addr 1)

motor_sockets:
  shared_disable_pin: gpio.13
  sockets:
    - label: "X Motor"
      generic_name: Motor1
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: gpio.14, direction_pin: gpio.12 }
      extra: { bus: uart1, addr: 0 }
      notes: "Limit input gpio.36 is wired to this axis in the example config; see generic_pins."
    - label: "Y Motor"
      generic_name: Motor2
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: gpio.25, direction_pin: gpio.26 }
      extra: { bus: uart1, addr: 1 }
      notes: "Limit input gpio.39 is wired to this axis in the example config; see generic_pins."
    - label: "Z (pen lift)"
      generic_name: Motor3
      driver_class: onboard_fixed
      fixed_motor_type: rc_servo
      pins: { output_pin: gpio.21 }
      notes: >
        Standard RC servo connector, typically used for a pen-lift
        mechanism. If you don't use an RC Servo, you can
        use the signal pin as a 5V output signal. gpio.21 is therefore
        also recorded below as a plain 5V output (generic_pins)

generic_pins:
  # X/Y limit inputs, shipped by default configured for StallGuard
  # sensorless homing instead of the usual physical-switch terminal block.
  # Wiki, verbatim: "Inputs gpio.36 and gpio.39 ship setup for use with
  # stallguard. They have resistors soldered on SJ1 and SJ2. If you want to
  # use the terminal blocks, unsolder the resistors on SJ1 and SJ2." --
  # external_pullup_required left false since SJ1/SJ2 are populated by
  # default; if desoldered for physical-switch use, that stated onboard
  # pull is what's being removed (an external one may then be needed
  # depending on the switch used, but that's a wiring-choice detail, not a
  # fixed board fact recorded here).
  - { label: "Inputs - 36 XLim / StallGuard", generic_name: "In36", mcu_pin: gpio.36, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false }, notes: "SJ1-populated by default for StallGuard use; unsolder SJ1 to use the physical limit terminal instead." }
  - { label: "Inputs - 39 YLim / StallGuard", generic_name: "In39", mcu_pin: gpio.39, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false }, notes: "SJ2-populated by default for StallGuard use; unsolder SJ2 to use the physical limit terminal instead." }

  - { label: "Inputs - 35", generic_name: "In35", mcu_pin: gpio.35, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false } }
  - { label: "Inputs - 34", generic_name: "In34", mcu_pin: gpio.34, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false } }
  - { label: "Inputs - 33", generic_name: "In33", mcu_pin: gpio.33, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false } }
  - { label: "Inputs - 32", mcu_pin: gpio.32, direction: input, input_profile: { conditioning: rc_filtered, external_pullup_required: false } }

  # 3x 5V outputs ("3 5V outputs to control lasers and accessories"
  - { label: "Outputs - 22", generic_name: "5V Out22", mcu_pin: gpio.22, direction: output, output_profile: { drive_type: totem_pole, voltage_max: 5.0 } }
  - { label: "Outputs - 27", generic_name: "5V Out27", mcu_pin: gpio.27, direction: output, output_profile: { drive_type: totem_pole, voltage_max: 5.0 } }
  - { label: "Outputs - 2", generic_name: "5V Out2", mcu_pin: gpio.2, direction: output, output_profile: { drive_type: totem_pole, voltage_max: 5.0 } }

  # RC servo signal pin on gpio.21, reusable as a plain 5V output
  - { label: "RC Servo (as 5V output)", generic_name: "5V Out21", mcu_pin: gpio.21, direction: output, output_profile: { drive_type: totem_pole, voltage_max: 5.0 }, notes: "Shares gpio.21 with the Z motor socket's rc_servo output_pin -- usable as one or the other, not both." }

  # Module pins separated out for general purpose use
  - { label: "I/O Expander - 4", generic_name: "IO4", mcu_pin: gpio.4, direction: either, input_profile: { conditioning: raw }, output_profile: { drive_type: totem_pole } }
  - { label: "I/O Expander - 15", generic_name: "IO15", mcu_pin: gpio.15, direction: either, input_profile: { conditioning: raw }, output_profile: { drive_type: totem_pole } }

# Module pins for use with an I/O Expander module
expansion_uarts:
  - label: "I/O Expander"
    generic_name: "Expander"
    connector_type: "CNC I/O module header (2 of the usual 4 I/O pins wired)"
    txd_pin: gpio.4
    rxd_pin: gpio.15
    baud: 5000000
    mode: "8N1"
    notes: >
      Wiki: "typically used to connect a display or pendant via a UART
      connection... uses the standard pinout for CNC I/O module, but there
      are only 2 I/O pins instead of the normal 4... may need to clip some
      unused pins to avoid touching components."
