      let pathSoFar = [];
      selects.forEach(sel => {
        Array.from(sel.options).forEach(opt => {
          if (opt.value === "unused") { opt.disabled = false; return; }
          const childNode = node.children[opt.value];
          if (!childNode) { opt.disabled = false; return; }
          if (!childNode.children) {
            const full = pathSoFar.concat([opt.value]).join(":");
            applyDisable(opt, full, key);
          } else {
            const leaves = enumerateLeafPaths(childNode, pathSoFar.concat([opt.value]));
            const exhausted = leaves.length > 0 && leaves.every(path => {
              const owner = claimed[path.join(":")];
              return owner && owner.key !== key;
            });
            opt.disabled = exhausted;
          }
        });
        if (sel.value !== "unused" && node.children[sel.value]) {
          pathSoFar = pathSoFar.concat([sel.value]);
          node = node.children[sel.value];
        }
      });
    }
  });
}

/* Third pane: an optional board photo with clickable regions, sourced from
 * hotspots/<id>.hotspots.yaml (fetched in loadBoard()) -- entirely a
 * presentation aid layered on top of the real resource-binding rows in
 * #resourceCol, never a second way to actually bind anything. Hidden
 * entirely (main reverts to its normal 2-column layout) for any board
 * without hotspot data. */
function renderHotspotPane() {
  const mainEl = document.querySelector("main");
  const col = document.getElementById("hotspotCol");
  if (!hotspotData) {
    col.style.display = "none";
    mainEl.style.gridTemplateColumns = "1fr 1fr";
    col.innerHTML = "";
    return;
  }
  mainEl.style.gridTemplateColumns = "320px 1fr 1fr";
  col.style.display = "";
  col.innerHTML = `<div class="note">Click a highlighted region to jump to its row on the left. (Prototype — board photos/hotspots only exist for the Corgi board so far.)</div>
    <div id="hotspotImgWrap">
      <img id="hotspotImg" src="${escapeAttr(hotspotData.image)}" alt="board photo">
      <div id="hotspotOverlay"></div>
    </div>`;
  const overlay = document.getElementById("hotspotOverlay");
  (hotspotData.hotspots || []).forEach(h => {
    const el = document.createElement("div");
    el.className = "hotspot-rect";
    el.style.left = h.rect.x + "%";
    el.style.top = h.rect.y + "%";
    el.style.width = h.rect.w + "%";
    el.style.height = h.rect.h + "%";
    el.dataset.labels = JSON.stringify(h.labels);
    el.onclick = () => jumpToLabels(h.labels, el);
    // Connector's own name always shows in the connector box's corner --
    // unconditional, regardless of whether a label_rect exists.
    const labelSpan = document.createElement("span");
    labelSpan.className = "hotspot-label";
    labelSpan.textContent = h.labels.join(", ");
    el.appendChild(labelSpan);
    overlay.appendChild(el);
    if (h.label_rect) {
      // Separate box for the ASSIGNED ROLE (once one exists), positioned in
      // the same % coordinate space as the connector rect (i.e. relative to
      // the overlay, not nested inside the connector box), so it can sit
      // anywhere on the photo -- typically just outside a small/crowded
      // connector where there's no room for both its own name and a role.
      // Text is populated/hidden live by refreshHotspotStates() below,
      // since the assigned role can change on every binding edit.
      const roleSpan = document.createElement("span");
      roleSpan.className = "hotspot-role-label" + (h.label_orientation === "vertical" ? " vertical" : "");
      roleSpan.dataset.labels = JSON.stringify(h.labels);
      roleSpan.style.left = h.label_rect.x + "%";
      roleSpan.style.top = h.label_rect.y + "%";
      roleSpan.style.width = h.label_rect.w + "%";
      roleSpan.style.height = h.label_rect.h + "%";
      overlay.appendChild(roleSpan);
    }
  });
  refreshHotspotStates();
}

/* Reads whichever left-pane row(s) a label maps to and reports its CURRENT
 * binding state directly from that row's own <select>(s) -- rather than
 * re-deriving it from `bindings[key]` (whose value format/shape varies a
 * lot across resource types: "x:motor0", "limit:x:motor0:neg", "spindle:pwm",
 * "vfd:Huanyang", etc.), this just reads back whatever the select is
 * already showing the user, which is inherently already the right
 * human-readable text and trivially correct regardless of format. A row's
 * first <select> follows this file's universal convention of "unused" as
 * the not-yet-assigned value (see makeRow/makeOutputRow/makeInputRow) --
 * any select that's hidden (style.display "none", e.g. an output row's
 * unused secondary picker) or has no options yet is skipped. */
function getRowRoleInfo(label) {
  const row = Array.from(document.querySelectorAll("#resourceCol .row"))
    .find(r => r.querySelector(".name") && r.querySelector(".name").textContent === label);
  if (!row) return { row: null, assigned: false, roleText: "" };
  const selects = Array.from(row.querySelectorAll("select")).filter(s => s.style.display !== "none" && s.options.length);
  if (!selects.length) return { row, assigned: false, roleText: "" };
  const assigned = selects[0].value !== "unused" && selects[0].value !== "";
  const roleText = assigned
    ? selects.map(s => (s.options[s.selectedIndex] || {}).textContent || "").filter(Boolean).join(" / ")
    : "";
  return { row, assigned, roleText };
}

/* Refreshes every hotspot's assigned/unassigned color and hover tooltip
 * from the left pane's CURRENT state -- called once at board load and
 * again after every generateDraft() (i.e. every binding change), so the
 * photo always reflects reality live, not just a snapshot from when the
 * pane was first built. */
function refreshHotspotStates() {
  if (!hotspotData) return;
  document.querySelectorAll("#hotspotOverlay .hotspot-rect").forEach(el => {
    let hlabels = [];
    try { hlabels = JSON.parse(el.dataset.labels || "[]"); } catch (e) {}
    const infos = hlabels.map(getRowRoleInfo);
    const assigned = infos.some(i => i.assigned);
    el.classList.toggle("assigned", assigned);
    el.title = hlabels.map((label, i) => infos[i].assigned ? `${label}: ${infos[i].roleText}` : label).join("\n");
  });
  // Populate/hide each hotspot's separate role label (only exists for
  // hotspots with an editor-authored label_rect -- see renderHotspotPane()).
  // Empty when nothing's assigned yet: :empty { display:none } in CSS hides
  // the box entirely rather than showing a blank chip over the photo.
  document.querySelectorAll("#hotspotOverlay .hotspot-role-label").forEach(el => {
    let hlabels = [];
    try { hlabels = JSON.parse(el.dataset.labels || "[]"); } catch (e) {}
    const infos = hlabels.map(getRowRoleInfo);
    const roleText = infos.filter(i => i.assigned).map(i => i.roleText).join(" / ");
    el.textContent = roleText;
  });
}

/* Clicking a hotspot highlights + scrolls to whichever left-pane row(s)
 * share its label(s) -- a hotspot can name more than one label (a single
 * physical connector serving more than one FluidNC resource role, e.g.
 * Corgi's MOSFET1/5V-out pin), in which case every matching row is
 * highlighted, not just the first. Purely a navigation aid -- clicking
 * never changes any binding itself. Magenta (.active / .hotspot-target) is
 * reserved for this selection state alone, distinct from the yellow/green
 * assigned-state colors set by refreshHotspotStates(), so "the one I just
 * clicked" always reads unambiguously regardless of whether it's also
 * bound to something yet. */
function clearHotspotSelection() {
  document.querySelectorAll(".hotspot-rect.active").forEach(e => e.classList.remove("active"));
  document.querySelectorAll("#resourceCol .row.hotspot-target").forEach(e => e.classList.remove("hotspot-target"));
}

function jumpToLabels(labelList, hotspotEl) {
  clearHotspotSelection();
  if (hotspotEl) hotspotEl.classList.add("active");
  const rows = Array.from(document.querySelectorAll("#resourceCol .row"));
  let first = null;
  labelList.forEach(label => {
    const row = rows.find(r => r.querySelector(".name") && r.querySelector(".name").textContent === label);
    if (row) {
      row.classList.add("hotspot-target");
      if (!first) first = row;
    }
  });
  if (first && first.scrollIntoView) first.scrollIntoView({ behavior: "smooth", block: "center" });
}

/* Same selection, the other direction: clicking a left-pane resource row
 * activates + scrolls to its matching hotspot(s) on the photo, same
 * magenta .active/.hotspot-target state jumpToLabels() sets, just started
 * from the opposite end. Wired alongside the hover link below (same
 * matches array), since both need the identical row<->rect correspondence. */
function selectFromRow(row, matches) {
  clearHotspotSelection();
  matches.forEach(el => el.classList.add("active"));
  row.classList.add("hotspot-target");
  if (matches[0] && matches[0].scrollIntoView) matches[0].scrollIntoView({ behavior: "smooth", block: "center" });
}

/* Bidirectional link, the other direction: hovering a left-pane resource
 * row highlights its matching hotspot(s) on the photo (if any exist for
 * this board/label) -- reinforces "this row is that physical connector"
 * without requiring a click. Wired once per board load, right after both
 * #resourceCol and the hotspot pane are built. */
function wireHotspotHoverLinks() {
  if (!hotspotData) return;
  const rects = Array.from(document.querySelectorAll("#hotspotOverlay .hotspot-rect"));
  document.querySelectorAll("#resourceCol .row").forEach(row => {
    const nameEl = row.querySelector(".name");
    if (!nameEl) return;
    const label = nameEl.textContent;
    const matches = rects.filter(el => {
      let hlabels = [];
      try { hlabels = JSON.parse(el.dataset.labels || "[]"); } catch (e) {}
      return hlabels.includes(label);
    });
    if (!matches.length) return;
    row.addEventListener("mouseenter", () => matches.forEach(el => el.classList.add("hover")));
    row.addEventListener("mouseleave", () => matches.forEach(el => el.classList.remove("hover")));
    // Clicking the row itself (not just hovering) selects it the same way
    // clicking its hotspot would -- doesn't interfere with the row's own
    // <select>(s), which keep their normal click-to-open behavior; this
    // just adds the same magenta selection state on top.
    row.addEventListener("click", () => selectFromRow(row, matches));
  });
}

function renderResources() {
  const col = document.getElementById("resourceCol");
  col.innerHTML = "";

  const note = document.createElement("div");
  note.className = "note";
  note.innerHTML = `<b>${board.board.name}</b> (${board.board.manufacturer}) — ` +
    `stepping engine(s): <code>${(board.stepping.engines||[]).join(", ")}</code>. ` +
    `Each row below is one physical board resource (from the board file). Pick the FluidNC ` +
    `role it plays, or leave it Unused. This is Phase A — resource → role binding.`;
  col.appendChild(note);

  // Kinematics has NO left-pane row -- the left pane is pure board-resource
  // assignment, and a kinematic system choice isn't tied to any board
  // resource at all (any board can in principle host any kinematic
  // system). The selector itself now lives INSIDE the generated draft (see
  // kinWidgetHtml()/the KINSELECT sentinel in generateDraft()), right where
  // the kinematics: block's system-name key sits, defaulting to Cartesian
  // per FluidNC's own real default (Kinematics::afterParse()). Choosing a
  // system with subordinate geometry items (Parallel Delta, Wall Plotter)
  // auto-populates them as ordinary TBD fields alongside it.

  // Start: has NO left-pane row either -- same reasoning as Kinematics.
  // It's always emitted directly into the draft below with its fields
  // already inline-editable there (see generateDraft()'s Start block):
  // must_home is left genuinely TBD (whether homing should be required is a
  // real decision), while deactivate_parking/check_limits are pre-populated
  // with FluidNC's own compiled-in defaults via the same defaultOverrides
  // mechanism used for board-specific hints -- rarely-changed settings the
  // user need not think about, but can still edit inline if they want to.

  // Fixed peripherals — informational only, not assignable.
  if (board.fixed_peripherals) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Fixed peripherals (already known, not assignable)</h2>`;
    const list = document.createElement("div");
    list.className = "fixed-list";
    const fp = board.fixed_peripherals;
    const lines = [];
    if (fp.spi) lines.push(`SPI bus: <code>${JSON.stringify(fp.spi)}</code>`);
    if (fp.sdcard) lines.push(`SD card: <code>${JSON.stringify(fp.sdcard)}</code>`);
    if (fp.i2so) lines.push(`I2SO shift register: <code>${JSON.stringify(fp.i2so)}</code>`);
    if (fp.dedicated_uarts) fp.dedicated_uarts.forEach(u => lines.push(`Dedicated UART (${u.label}): <code>${JSON.stringify(u)}</code>`));
    list.innerHTML = lines.join("<br>");
    sec.appendChild(list);
    col.appendChild(sec);
  }

  // Motor sockets
  if (board.motor_sockets && board.motor_sockets.sockets) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Motor sockets</h2>`;
    board.motor_sockets.sockets.forEach((s, i) => {
      const key = resourceKeyMotor(i);
      sec.appendChild(makeInputRow(
        key, s.label,
        `${s.driver_class}${s.fixed_motor_type ? " — " + s.fixed_motor_type : ""}`,
        MOTOR_ROLE_TREE
      ));
    });
    col.appendChild(sec);
  }

  // Generic pins
  if (board.generic_pins) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Generic pins</h2>`;
    board.generic_pins.forEach((p, i) => {
      const key = resourceKeyPin(i);
      const sub = `${p.mcu_pin} — ${p.direction}`;
      sec.appendChild(p.direction === "output" ? makeOutputRow(key, p.label, sub) : makeInputRow(key, p.label, sub, INPUT_ROLE_TREE));
    });
    col.appendChild(sec);
  }

  // Expansion sockets
  if (board.expansion_sockets) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Expansion socket pins</h2>`;
    board.expansion_sockets.forEach((s, si) => {
      (s.pins||[]).forEach((p, pi) => {
        const key = resourceKeyExp(si, pi);
        const name = `${s.label} — pin ${p.module_pin}`;
        const sub = `${p.mcu_pin} — ${p.direction}`;
        sec.appendChild(p.direction === "output" ? makeOutputRow(key, name, sub) : makeInputRow(key, name, sub, INPUT_ROLE_TREE));
      });
    });
    col.appendChild(sec);
  }

  // RS485 channels -- one coupled resource (tx/rx/optional rts), one dropdown.
  if (board.rs485_channels) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>RS485 channels</h2>`;
    board.rs485_channels.forEach((ch, i) => {
      const key = resourceKeyRs485(i);
      const pins = `tx=${ch.tx_pin} rx=${ch.rx_pin}` + (ch.rts_pin ? ` rts=${ch.rts_pin}` : "");
      sec.appendChild(makeRow(key, ch.label, pins, rs485RoleOptions()));
    });
    col.appendChild(sec);
  }

  // Expansion UART connectors (e.g. Corgi's RJ12) -- fixed pins, the only
  // real choice is whether to use it at all (role: "uart_channel").
  if (board.expansion_uarts) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Expansion UART connectors</h2>`;
    board.expansion_uarts.forEach((ex, i) => {
      const key = resourceKeyExpUart(i);
      const pins = `txd=${ex.txd_pin} rxd=${ex.rxd_pin}${ex.connector_type ? " (" + ex.connector_type + ")" : ""}`;
      sec.appendChild(makeRow(key, ex.label, pins, [
        { value: "unused", label: "— Unused —" },
        { value: "uart_channel", label: `I/O Expansion (uart_channel, uart${defaultSecondaryUartNum(board)})` },
      ]));
    });
    if (boardHasUartTmc(board) && board.rs485_channels && board.rs485_channels.length) {
      const warn = document.createElement("div");
      warn.className = "note";
      warn.innerHTML = `<b>Note:</b> this board's onboard TMC drivers already use uart1, so both RS485 ` +
        `and this expansion connector default to uart2 -- per real FluidNC board docs, only one of them ` +
        `can actually be used in a given config file.`;
      sec.appendChild(warn);
    }
    col.appendChild(sec);
  }

  // I2C connectors -- unlike spi:/i2so:, FluidNC rarely has any onboard
  // I2C device (its only I2C-consuming feature, an OLED display, is
  // deprecated), so a board's I2C pins are almost always just brought out
  // to an external connector, not auto-consumed. I2C pins are also often
  // bare GPIOs, so the same connector is frequently repurposed as a plain
  // expansion UART instead (scl_pin -> tx, sda_pin -> rx) -- same idea as
  // an expansion_uart connector. This is therefore bindable, not a fixed
  // peripheral: unused / a real i2c0: bus / a generic expansion UART.
  if (board.i2c_connectors) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>I2C connectors</h2>`;
    board.i2c_connectors.forEach((ic, i) => {
      const key = resourceKeyI2c(i);
      const pins = `sda=${ic.sda_pin} scl=${ic.scl_pin}`;
      sec.appendChild(makeRow(key, ic.label, pins, [
        { value: "unused", label: "— Unused —" },
        { value: "i2c_bus", label: "I2C Bus (i2c0: — e.g. OLED display)" },
        { value: "expansion_uart", label: `Expansion UART (scl=tx, sda=rx, uart${defaultSecondaryUartNum(board)})` },
      ]));
    });
    col.appendChild(sec);
  }
}

function makeRow(key, name, sub, options) {
  const row = document.createElement("div");
  row.className = "row";
  row.dataset.resourceKey = key;
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  const sel = document.createElement("select");
  sel.dataset.key = key;
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.value; opt.textContent = o.label;
    sel.appendChild(opt);
  });
  sel.value = bindings[key] || "unused";
  sel.onchange = () => { bindings[key] = sel.value; generateDraft(); };
  const wrap = document.createElement("div");
  wrap.className = "ctrl-wrap";
  const conflictNote = document.createElement("span");
  conflictNote.className = "conflict-note";
  wrap.appendChild(sel); wrap.appendChild(conflictNote);
  row.appendChild(lbl); row.appendChild(wrap);
  return row;
}

/* Two-step row for output-capable pins: step 1 picks the category
 * (a spindle type, or coolant/digital-output as before); step 2, only
 * shown when step 1 is a spindle type, picks which pin within that type.
 * This is what keeps the per-pin option list from growing every time a
 * new spindle type (Relay, HBridge, Dac, ...) gets added to SPINDLE_TYPES
 * -- only the (hidden-until-needed) step 2 list grows. */
function makeOutputRow(key, name, sub) {
  const row = document.createElement("div");
  row.className = "row output-row";
  row.dataset.resourceKey = key;
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  row.appendChild(lbl);

  const controls = document.createElement("div");
  controls.className = "output-controls";

  const primary = document.createElement("select");
  outputCategoryOptions().forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.value; opt.textContent = o.label;
    primary.appendChild(opt);
  });

  const secondary = document.createElement("select");
  secondary.style.display = "none";

  function refreshSecondary() {
    const cat = primary.value;
    const opts = cascadeOptionsFor(cat);
    if (opts) {
      const curSub = roleSubValue(bindings[key] || "");
      secondary.innerHTML = "";
      opts.forEach(([val, label]) => {
        const opt = document.createElement("option");
        opt.value = val; opt.textContent = label;
        secondary.appendChild(opt);
      });
      // Same "prefer an unclaimed option" policy as makeInputRow's
      // firstLeafPathFrom() -- otherwise switching two different resources
      // to the same cascading category (e.g. both to "Digital Output")
      // would silently default BOTH to "Output 0" before the graying logic
      // ever ran. Falls back to the first option if every one is claimed.
      const unclaimedVal = opts.find(([v]) => {
        const full = `${cat}:${v}`;
        return !Object.keys(resourcePins).some(k => k !== key && bindings[k] === full);
      });
      secondary.value = opts.some(p => p[0] === curSub) ? curSub : (unclaimedVal ? unclaimedVal[0] : opts[0][0]);
      secondary.style.display = "";
    } else {
      secondary.style.display = "none";
    }
  }

  primary.value = roleCategory(bindings[key] || "unused");
  refreshSecondary();

  primary.onchange = () => {
    const cat = primary.value;
    if (cascadeOptionsFor(cat)) {
      refreshSecondary();
      const full = `${cat}:${secondary.value}`;
      // A category with every secondary option already claimed elsewhere is
      // now grayed out at the primary level by refreshRoleUniqueness() (so
      // this branch shouldn't normally be reachable via the UI at all) --
      // this is just a silent, no-popup safety net in case bindings ever
      // gets into that state some other way (refreshSecondary() already
      // prefers an unclaimed option, so this only fires if literally none
      // exist).
      const stillDuplicate = Object.keys(resourcePins).some(k => k !== key && bindings[k] === full);
      if (stillDuplicate) {
        bindings[key] = "unused";
        primary.value = "unused";
        secondary.style.display = "none";
      } else {
        bindings[key] = full;
      }
    } else {
      secondary.style.display = "none";
      bindings[key] = cat;
    }
    generateDraft();
  };
  secondary.onchange = () => {
    bindings[key] = `${primary.value}:${secondary.value}`;
    generateDraft();
  };

  controls.appendChild(primary);
  controls.appendChild(secondary);
  const conflictNote = document.createElement("span");
  conflictNote.className = "conflict-note";
  controls.appendChild(conflictNote);
  row.appendChild(controls);
  return row;
}

/* Generic N-level cascading row for input-capable pins, driven by a role
 * tree (see INPUT_ROLE_TREE). Unlike makeOutputRow's fixed 2 selects, this
 * renders however many <select> elements the chosen branch actually needs
 * -- 1 for Probe, 2 for Control/Macro, 3 for Limit -- and re-renders from
 * scratch on every change. Whenever a choice is made at some level, any
 * deeper level is auto-filled with its first child so bindings[key] always
 * names a complete, valid leaf value (same policy makeOutputRow uses). */
function makeInputRow(key, name, sub, tree) {
  const row = document.createElement("div");
  row.className = "row cascade-row";
  row.dataset.resourceKey = key;
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  row.appendChild(lbl);

  const controls = document.createElement("div");
  controls.className = "cascade-controls";
  row.appendChild(controls);
  const conflictNote = document.createElement("span");
  conflictNote.className = "conflict-note";
  // Appended inside controls at the end of every render() call below (not
  // just once here) -- render() does `controls.innerHTML = ""` on every
  // rebuild (each level change), which would otherwise wipe this out.
  row._cascadeTree = tree; // read by refreshRoleUniqueness() to gray out exhausted branches, not just exhausted leaves

  // Auto-fills the remaining levels below a newly-chosen branch down to a
  // leaf (same "always land on a complete, valid role value" policy
  // makeOutputRow uses) -- but prefers the first leaf NOT already claimed by
  // a DIFFERENT resource (see refreshRoleUniqueness()), rather than always
  // the tree's literal first child. Without this, picking the same branch
  // on two different resources (e.g. two motor sockets both set to "X
  // axis") would silently auto-assign BOTH of them the exact same leaf
  // ("First Motor") before the graying logic ever got a chance to steer the
  // user away from it. Returns null (NOT a duplicate) if every leaf under
  // this branch is already claimed elsewhere -- the caller must refuse the
  // pick rather than silently commit a second resource to an already-taken
  // role (a real bug in an earlier version of this fix: with only 2 real
  // leaves per axis, motor:0 and motor:1 could each grab one, but motor:2
  // switching to that SAME axis would still fall through to duplicating
  // motor:0's exact role since "every candidate is claimed" was treated as
  // "give up and pick the first one anyway" instead of "this pick is not
  // actually possible").
  function firstLeafPathFrom(node, segs) {
    const candidates = enumerateLeafPaths(node, segs);
    return candidates.find(path => {
      const val = path.join(":");
      return !Object.keys(resourcePins).some(k => k !== key && bindings[k] === val);
    }) || null;
  }

  function render() {
    controls.innerHTML = "";
    const curPath = (bindings[key] || "unused").split(":");

    const top = document.createElement("select");
    const unusedOpt = document.createElement("option");
    unusedOpt.value = "unused"; unusedOpt.textContent = "— Unused —";
    top.appendChild(unusedOpt);
    Object.keys(tree).forEach(k => {
      const opt = document.createElement("option");
      opt.value = k; opt.textContent = tree[k].label;
      top.appendChild(opt);
    });
    const topVal = tree[curPath[0]] ? curPath[0] : "unused";
    top.value = topVal;
    top.onchange = () => {
      if (top.value === "unused") {
        bindings[key] = "unused";
      } else {
        const leaf = firstLeafPathFrom(tree[top.value], [top.value]);
        if (!leaf) {
          // A branch with every leaf already claimed elsewhere is grayed
          // out by refreshRoleUniqueness() at this very select, so this
          // shouldn't normally be reachable via the UI -- silent, no-popup
          // safety net only.
          bindings[key] = "unused";
        } else {
          bindings[key] = leaf.join(":");
        }
      }
      // render() first, THEN generateDraft() -- refreshGpioConflicts()/
      // refreshRoleUniqueness() (called at the end of generateDraft()) need
      // to run against the FRESH selects render() is about to build, not
      // the stale ones about to be torn down, or this row's own new options
      // would show no disabled state until some unrelated later change.
      render();
      generateDraft();
    };
    controls.appendChild(top);
    controls.appendChild(conflictNote);
    if (topVal === "unused") return;

    let node = tree[topVal];
    let pathSoFar = [topVal];
    let level = 1;
    while (node.children) {
      const sel = document.createElement("select");
      Object.keys(node.children).forEach(ck => {
        const opt = document.createElement("option");
        opt.value = ck; opt.textContent = node.children[ck].label;
        sel.appendChild(opt);
      });
      const chosen = node.children[curPath[level]] ? curPath[level] : Object.keys(node.children)[0];
      sel.value = chosen;

      const parentNode = node, segsBefore = pathSoFar.slice();
      sel.onchange = () => {
        const chosenNode = parentNode.children[sel.value];
        const leaf = firstLeafPathFrom(chosenNode, segsBefore.concat([sel.value]));
        if (!leaf) {
          // Same silent safety net as the top-level handler above -- an
          // exhausted branch is grayed out here too, so this option
          // shouldn't normally be selectable via the UI at all.
          bindings[key] = "unused";
        } else {
          bindings[key] = leaf.join(":");
        }
        render(); // see the top-level onchange's comment on this ordering
        generateDraft();
      };

      controls.appendChild(sel);
      pathSoFar.push(chosen);
      node = node.children[chosen];
      level++;
    }
  }

  render();
  return row;
}

function countResources() {
  let n = 0;
  if (board.motor_sockets) n += (board.motor_sockets.sockets||[]).length;
  n += (board.generic_pins||[]).length;
  (board.expansion_sockets||[]).forEach(s => n += (s.pins||[]).length);
  n += (board.rs485_channels||[]).length;
  n += (board.expansion_uarts||[]).length;
  n += (board.i2c_connectors||[]).length;
  return n;
}

/* ---------------------------------------------------------------------
 * Phase B: build the draft config.yaml from current bindings.
 * TBD stubs are inserted only for parameters of roles that got bound —
 * never for the universe of possible FluidNC roles.
 * ------------------------------------------------------------------- */
function motorBlockFor(socket) {
  const dc = socket.driver_class;
  if (dc === "onboard_fixed") {
    const t = socket.fixed_motor_type;
    if (t === "rc_servo") {
      return { key: "rc_servo", body: {
        output_pin: socket.pins.output_pin,
        cal_min_mm: "TBD", cal_max_mm: "TBD"
      }};
    }
    if (t === "tmc_2209") {
      return { key: "tmc_2209", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        disable_pin: socket.pins.disable_pin,
        uart_num: 1,
        addr: socket.extra ? socket.extra.addr : "TBD",
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    if (t === "tmc_2130") {
      return { key: "tmc_2130", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        cs_pin: socket.pins.cs_pin,
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    if (t === "tmc_5160") {
      // FluidNC doesn't support TMC2160 by its own name -- it's functionally
      // identical to TMC5160 as far as FluidNC's driver code is concerned
      // (TMC5160 adds an onboard motion controller FluidNC doesn't use), so
      // a board with real TMC2160 chips (e.g. BTT Rodent) still uses
      // fixed_motor_type: tmc_5160. spi_index is a real, fixed board fact
      // (this chip's fixed position in the SPI daisy chain) -- not a
      // per-machine tuning choice -- so it comes straight from socket.extra,
      // same pattern as tmc_2209's addr.
      return { key: "tmc_5160", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        disable_pin: socket.pins.disable_pin || "NO_PIN",
        cs_pin: socket.pins.cs_pin || "NO_PIN",
        spi_index: socket.extra ? socket.extra.spi_index : "TBD",
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    return { key: t || "onboard_fixed", body: Object.assign({}, socket.pins, { run_amps: "TBD" }) };
  }
  if (dc === "stepstick_socket") {
    // Current and microstepping on a stepstick module are set by an onboard
    // trimpot and physical jumpers -- not software-configurable, so unlike
    // tmc_2209/tmc_2130 there are no tuning params to stub here at all.
    const body = {
      step_pin: socket.pins.step_pin,
      direction_pin: socket.pins.direction_pin,
      disable_pin: socket.pins.disable_pin || "NO_PIN"
    };
    return { key: "stepstick", body };
  }
  // external_connector
  return { key: "standard_stepper", body: {
    step_pin: socket.pins.step_pin,
    direction_pin: socket.pins.direction_pin,
    disable_pin: socket.pins.disable_pin || "NO_PIN"
  }};
}

// Same idea as KINSELECT/KINEMATICS_TYPES: this axis's homing entry is
// keyed by homingSentinel(letter) in `cfg` itself, whether homing is
// enabled or not, so the selector (homingWidgetHtml()) always sits exactly
// where the real "homing:" key belongs -- a non-existent homing: section
// really is different from an empty one, so the wizard shouldn't ever
// carry a real "homing" key around internally for a disabled axis, only
// this sentinel key. The final resolved/copy-download step (see
// generateDraft()) renames this key to the real "homing" when enabled, or
// deletes it outright when disabled -- so config.yaml genuinely omits the
// section rather than ever emitting an empty or placeholder one.
function homingSentinel(letter) { return `HOMINGSELECT_${letter}`; }

function ensureAxis(cfg, letter) {
  if (!cfg.axes[letter]) {
    cfg.axes[letter] = {
      steps_per_mm: "TBD",
      max_rate_mm_per_min: "TBD",
      acceleration_mm_per_sec2: "TBD",
      max_travel_mm: "TBD",
      soft_limits: "TBD",
      [homingSentinel(letter)]: homingEnabled[letter] ? {
        cycle: "TBD",
        positive_direction: "TBD",
        mpos_mm: "TBD",
        feed_mm_per_min: "TBD",
        seek_mm_per_min: "TBD",
        settle_ms: "TBD",
        seek_scaler: "TBD",
        feed_scaler: "TBD"
      } : null
    };
  }
  return cfg.axes[letter];
}

function generateDraft() {
  const cfg = {};
  cfg.name = "TBD";
  cfg.board = board.board.name;

  // Board-specific/pre-populated default overrides for open TBD fields --
  // see collectAndInjectSlots' defaultOverrides param. Declared up front
  // (rather than local to the motor-sockets loop below) since the Start:
  // block also contributes entries to this same map.
  const paramDefaultOverrides = {};

  // Terse "# <label>" comments are produced by inserting a marker KEY
  // (annotate(obj, targetKey, label) below), named after the exact real
  // key it captions, into the SAME object that key belongs to -- inserted
  // immediately before that key's first assignment, so plain JS object
  // insertion-order (already relied on elsewhere here, e.g. uart-before-
  // ModbusVFD ordering) places it directly above, as a SIBLING at the same
  // indentation, never nested inside the thing it's captioning (nesting it
  // one level deeper, e.g. right above a block's own first field, could be
  // misread as captioning only that first field rather than the whole
  // block). js-yaml dumps the marker as an ordinary-looking
  // "__ANNOTATE_FOR_<key>__: <label>" line; annotateYaml() below does a
  // dumb text pass converting every such line into "# <label>" afterward.
  // Naming the marker after its target key (rather than a plain running
  // counter) makes a second annotate() call for the same key idempotently
  // UPDATE that one marker in place rather than stack a second, stale
  // comment above it -- needed because some keys (e.g. a colliding uartN:
  // block shared by RS485 and an expansion UART) get legitimately
  // reassigned wholesale later in this function; the comment should track
  // whichever binding actually won, not accumulate every past one.
  function annotate(obj, targetKey, label) { obj[`__ANNOTATE_FOR_${targetKey}__`] = label; }

  // Kinematics -- always present, defaulting to a bare Cartesian
  // subsection (FluidNC's own real default when unspecified). No left-pane
  // row (see renderResources()'s comment) -- the system-name key itself is
  // a live selector INSIDE the draft, via the KINSELECT sentinel (see
  // kinWidgetHtml()/buildInteractiveYaml()); switching systems here
  // populates any subordinate geometry items as ordinary TBD fields. No
  // "# <label>" annotate() comment either, same reasoning as Start: not
  // tied to any particular board resource, so there's no "which board fact
  // triggered this" story worth captioning.
  const kt = KINEMATICS_TYPES[kinematicsType] || KINEMATICS_TYPES.Cartesian;
  cfg.kinematics = { KINSELECT: kt.stub() };

  // Start -- always present, no left-pane row (see comment on the section's
  // declaration above). must_home is left genuinely open (whether homing
  // should be required before running a program is a real per-machine
  // decision), but deactivate_parking/check_limits are pre-populated with
  // FluidNC's own compiled-in defaults via defaultOverrides -- settings the
  // user need not think about (rarely changed) but can still edit inline,
  // same mechanism as a board-specific hint like r_sense_ohms. No "# <label>"
  // annotate() comment here -- unlike every other annotated section/pin,
  // Start isn't associated with any particular board resource, so there's
  // no "which board fact triggered this" fact worth captioning.
  cfg.start = { must_home: "TBD", deactivate_parking: "TBD", check_limits: "TBD" };
  paramDefaultOverrides["start.deactivate_parking"] = { default: false, defaultKind: "firmware" };
  paramDefaultOverrides["start.check_limits"] = { default: true, defaultKind: "firmware" };

  const engineMap = { i2s: "I2S_STREAM", rmt: "RMT", timed: "Timed", pio: "PIO" };
  cfg.stepping = {
    engine: engineMap[(board.stepping.engines||["rmt"])[0]] || "RMT",
    idle_ms: "TBD", pulse_us: "TBD", dir_delay_us: "TBD", disable_delay_us: "TBD"
  };

  // Fixed peripherals: fully known facts, copied straight through, no TBD.
  const fp = board.fixed_peripherals || {};
  if (fp.spi) cfg.spi = fp.spi;
  if (fp.sdcard) cfg.sdcard = Object.assign({}, fp.sdcard);
  if (fp.i2so) cfg.i2so = { bck_pin: fp.i2so.bck_pin, data_pin: fp.i2so.data_pin, ws_pin: fp.i2so.ws_pin };
  // NOTE: I2C is intentionally NOT handled here as a fixed peripheral --
  // unlike spi:/i2so:, FluidNC rarely has an onboard device actually using
  // the bus (its only I2C-consuming feature, an OLED display, is
  // deprecated), so a board's I2C pins are a bindable resource
  // (board.i2c_connectors), handled below alongside expansion_uarts, not
  // auto-emitted here. (Also confirmed against the connected FluidNC
  // source, MachineConfig.cpp's handler.sections("i2c", 0, MAX_N_I2C,
  // ...), that the real config key is numbered i2c0:/i2c1:/etc., not a
  // bare "i2c:" -- reflected in that emission below.)
  (fp.dedicated_uarts||[]).forEach((u, i) => {
    cfg[`uart${i+1}`] = { txd_pin: u.txd_pin, rxd_pin: u.rxd_pin, baud: u.baud, mode: u.mode };
  });

  cfg.axes = {};
  if (board.motor_sockets && board.motor_sockets.shared_disable_pin) {
    cfg.axes.shared_stepper_disable_pin = board.motor_sockets.shared_disable_pin;
  }

  // (paramDefaultOverrides declared up front, near cfg.name/-cfg.board above --
  // populated below when a motor socket's own extra facts document a
  // board-specific override, e.g. BTT Rodent's verified-correct
  // r_sense_ohms, overriding the generic per-driver-family guess
  // specForKey would otherwise suggest.)

  // Phase A results -> Phase B stubbing, motor sockets
  (board.motor_sockets ? board.motor_sockets.sockets : []).forEach((socket, i) => {
    const role = bindings[resourceKeyMotor(i)];
    if (!role || role === "unused") return;
    const [letter, slot] = role.split(":");
    if (!AXES.includes(letter)) return;
    const axis = ensureAxis(cfg, letter);
    const block = motorBlockFor(socket);
    // Annotated on `axis` (a sibling of motor0:/motor1:, at the same
    // indentation), not inside axis[slot] -- a comment nested one level
    // deeper, right above standard_stepper:, could be misread as applying
    // only to that first item rather than to the whole motor0:/motor1:
    // block this connector's pins occupy.
    annotate(axis, slot, socket.label);
    axis[slot] = axis[slot] || {};
    axis[slot][block.key] = block.body;
    if (socket.extra && socket.extra.r_sense_ohms_hint != null) {
      paramDefaultOverrides[`axes.${letter}.${slot}.${block.key}.r_sense_ohms`] = {
        default: socket.extra.r_sense_ohms_hint,
        defaultKind: "board",
      };
    }
  });

  // Generic pins + expansion pins -> limits / control / probe / spindle / coolant / digital outs
  const allPins = [];
  (board.generic_pins||[]).forEach((p, i) => allPins.push({ p, key: resourceKeyPin(i) }));
  (board.expansion_sockets||[]).forEach((s, si) => (s.pins||[]).forEach((p, pi) =>
    allPins.push({ p: { label: `${s.label}/${p.module_pin}`, mcu_pin: p.mcu_pin, direction: p.direction }, key: resourceKeyExp(si, pi) })
  ));

  let spindleBound = false;
  cfg.control = {};
  allPins.forEach(({ p, key }) => {
    const role = bindings[key];
    if (!role || role === "unused") return;
    const pin = p.mcu_pin;

    if (role.startsWith("limit:")) {
      // "limit:<axis>:<motor0|motor1>:<neg|pos|all>" -- see INPUT_ROLE_TREE's
      // own declaration comment for why the motor level is real (a two-
      // motor axis' limit switches are per-motor in actual FluidNC config,
      // not shared at the axis level).
      const [, letter, motorSlot, which] = role.split(":");
      const axis = ensureAxis(cfg, letter);
      axis[motorSlot] = axis[motorSlot] || {};
      const field = which === "neg" ? "limit_neg_pin" : which === "pos" ? "limit_pos_pin" : "limit_all_pin";
      annotate(axis[motorSlot], field, p.label);
      axis[motorSlot][field] = pin;
    } else if (role.startsWith("probe:")) {
      // Child key is literally the real Probe:: config field name
      // ("pin" or "toolsetter_pin") -- see Probe::group() in the
      // connected FluidNC source.
      const field = role.split(":")[1];
      cfg.probe = cfg.probe || {};
      annotate(cfg.probe, field, p.label);
      cfg.probe[field] = pin;
    } else if (role.startsWith("control:")) {
      // Covers all real Control:: pins, including the 4 macro buttons
      // and fault/estop/homing_button, which are siblings of feed_hold
      // etc. in the actual "control:" config block.
      const which = role.split(":")[1];
      annotate(cfg.control, `${which}_pin`, p.label);
      cfg.control[`${which}_pin`] = pin;
    } else if (role.startsWith("user_input:")) {
      // Machine::UserInputs -- generic digital0-7/analog0-3 pins under
      // "user_inputs:", unrelated to Limit/Probe/Control.
      const [, subtype, idx] = role.split(":");
      cfg.user_inputs = cfg.user_inputs || {};
      annotate(cfg.user_inputs, `${subtype}${idx}_pin`, p.label);
      cfg.user_inputs[`${subtype}${idx}_pin`] = pin;
    } else if (role.startsWith("spindle:")) {
      // Spindle type picks both the top-level config key and the exact
      // TBD tuning stub via SPINDLE_TYPES -- same dispatch-by-chosen-
      // variant pattern used for motor sockets and RS485/VFD spindles.
      // Each type's stub() reflects its own real config fields (e.g.
      // Relay/DAC genuinely have no pwm_hz; BESC has two extra tunables),
      // verified against FluidNC's actual source, not assumed uniform.
      const [, type, which] = role.split(":");
      const def = SPINDLE_TYPES[type];
      const cfgKey = def ? def.cfgKey : type;
      cfg[cfgKey] = cfg[cfgKey] || (def ? def.stub() : {});
      annotate(cfg[cfgKey], `${which}_pin`, p.label);
      cfg[cfgKey][`${which}_pin`] = pin;
      spindleBound = true;
    } else if (role.startsWith("coolant:")) {
      cfg.coolant = cfg.coolant || {};
      const which = role.split(":")[1];
      annotate(cfg.coolant, `${which}_pin`, p.label);
      cfg.coolant[`${which}_pin`] = pin;
    } else if (role.startsWith("digital_output:")) {
      cfg.user_outputs = cfg.user_outputs || {};
      const n = role.split(":")[1];
      annotate(cfg.user_outputs, `digital${n}_pin`, p.label);
      cfg.user_outputs[`digital${n}_pin`] = pin;
    } else if (role.startsWith("analog_output:")) {
      cfg.user_outputs = cfg.user_outputs || {};
      const n = role.split(":")[1];
      annotate(cfg.user_outputs, `analog${n}_pin`, p.label);
      cfg.user_outputs[`analog${n}_pin`] = pin;
      // analogN_hz (userOutputsSection) -- per-channel PWM frequency, a
      // real config field with no resource/pin of its own to bind, so it's
      // stubbed as an ordinary open TBD the moment this channel gets a pin,
      // same as a spindle type's tuning fields. Only set once per channel
      // (never overwrites a value the user already typed in).
      if (cfg.user_outputs[`analog${n}_hz`] === undefined) cfg.user_outputs[`analog${n}_hz`] = "TBD";
    } else if (role.startsWith("status_output:")) {
      // Status_Outputs -- machine-state indicator pins (e.g. tower
      // lights), independent of Limit/Probe/Control/Spindle/Coolant/user
      // I/O. report_interval_ms is stubbed once per board, same as
      // uart_channel's.
      const which = role.split(":")[1];
      cfg.status_outputs = cfg.status_outputs || { report_interval_ms: "TBD" };
      annotate(cfg.status_outputs, `${which}_pin`, p.label);
      cfg.status_outputs[`${which}_pin`] = pin;
    }
  });
  if (Object.keys(cfg.control).length === 0) delete cfg.control;

  // RS485 channels -> Modbus VFD spindle. Modern FluidNC form: a single
  // ModbusVFD: block with a model: field (the old per-model top-level key,
  // e.g. Huanyang:, still works but is strictly a backwards-compatibility
  // alias) plus a separate uartN: block carrying the actual bus pins, same
  // as how a dedicated TMC UART bus becomes its own uart1: block elsewhere
  // in this file. modbus_id is set to its near-universal real value (1)
  // rather than left open, since it almost never changes in practice.
  // uart_num defaults to 1, or 2 on a board with UART-addressed onboard TMC
  // drivers already on 1 (see defaultSecondaryUartNum) -- confirmed against
  // real per-board wiki examples (6x/Corgi's own Huanyang examples use
  // uart1; the 4x wiki's commented-out RS485 example, on a TMC-UART board,
  // uses uart2).
  (board.rs485_channels || []).forEach((ch, i) => {
    const role = bindings[resourceKeyRs485(i)];
    if (!role || role === "unused" || !role.startsWith("vfd:")) return;
    const model = role.split(":")[1];
    const n = defaultSecondaryUartNum(board);
    // uartN: (the dependency) is set before ModbusVFD: (the referencer) --
    // object key insertion order drives jsyaml.dump's output order, and
    // conventionally a bus block is declared before the thing that uses it.
    // Annotated on `cfg` itself, as a sibling immediately above uartN:/
    // ModbusVFD: (same indentation as those top-level keys) -- not inside
    // either block, where it could be misread as captioning just that
    // block's first field (txd_pin/model) rather than the whole section.
    const uartBlock = { txd_pin: ch.tx_pin, rxd_pin: ch.rx_pin };
    if (ch.rts_pin) uartBlock.rts_pin = ch.rts_pin;
    annotate(cfg, `uart${n}`, ch.label);
    cfg[`uart${n}`] = uartBlock;
    annotate(cfg, "ModbusVFD", ch.label);
    cfg.ModbusVFD = {
      model: model,
      uart_num: n,
      modbus_id: 1,
      spinup_ms: "TBD",
      spindown_ms: "TBD",
      tool_num: "TBD"
    };
  });

  // Expansion UART connectors (e.g. Corgi's RJ12) -> a uart_channel role.
  // Fixed pins/baud/mode are board facts; report_interval_ms is the one
  // genuinely open tuning param (wiki's own examples use 75ms but nothing
  // suggests that's a hard requirement). No rts_pin/cts_pin board fact
  // exists for this connector type (see expansion_uart schema) -- both are
  // always written as literal NO_PIN, matching every real example seen.
  // Shares the same uart_num default/collision policy as RS485 above --
  // if a board's config binds both an expansion_uart AND an RS485 channel
  // and they land on the same uart_num, this cfg[`uart${n}`] assignment
  // will simply overwrite the earlier one, faithfully reproducing the
  // real, accepted "only one of them is usable" limitation on such boards
  // rather than silently working around it.
  (board.expansion_uarts || []).forEach((ex, i) => {
    const role = bindings[resourceKeyExpUart(i)];
    if (!role || role === "unused" || role !== "uart_channel") return;
    const n = defaultSecondaryUartNum(board);
    // Same sibling-of-cfg annotation placement as RS485 above.
    const uartBlock = {
      txd_pin: ex.txd_pin,
      rxd_pin: ex.rxd_pin,
      rts_pin: "NO_PIN",
      cts_pin: "NO_PIN",
      baud: ex.baud,
      mode: ex.mode,
    };
    annotate(cfg, `uart${n}`, ex.label);
    cfg[`uart${n}`] = uartBlock;
    annotate(cfg, `uart_channel${n}`, ex.label);
    cfg[`uart_channel${n}`] = { report_interval_ms: "TBD", uart_num: n };
  });

  // I2C connectors -> either a real i2c0: bus (e.g. the deprecated OLED
  // display, FluidNC's only I2C-consuming feature) or, since I2C pins are
  // often bare GPIOs, repurposed entirely as a generic expansion UART
  // (scl_pin -> txd_pin, sda_pin -> rxd_pin) -- same uart_channel shape as
  // an expansion_uart connector, since the far end is equally an external,
  // config-author-visible device rather than anything onboard. Unlike a
  // dedicated expansion_uart connector, this repurposed bus has no fixed
  // baud/mode board fact (I2C pins don't imply a specific UART protocol),
  // so those are left as open TBD params instead of copied from the board.
  (board.i2c_connectors || []).forEach((ic, i) => {
    const role = bindings[resourceKeyI2c(i)];
    if (!role || role === "unused") return;
    if (role === "i2c_bus") {
      annotate(cfg, "i2c0", ic.label);
      cfg.i2c0 = { sda_pin: ic.sda_pin, scl_pin: ic.scl_pin };
    } else if (role === "expansion_uart") {
      const n = defaultSecondaryUartNum(board);
      const uartBlock = {
        txd_pin: ic.scl_pin,
        rxd_pin: ic.sda_pin,
        rts_pin: "NO_PIN",
        cts_pin: "NO_PIN",
        baud: "TBD",
        mode: "TBD",
      };
      annotate(cfg, `uart${n}`, ic.label);
      cfg[`uart${n}`] = uartBlock;
      annotate(cfg, `uart_channel${n}`, ic.label);
      cfg[`uart_channel${n}`] = { report_interval_ms: "TBD", uart_num: n };
    }
  });

  // Uncategorized top-level items -- confirmed against the connected
  // FluidNC source (MachineConfig.cpp:83-89, MachineConfig::group()'s tail
  // end, after every named handler.section(...) call): 7 loose fields set
  // directly on MachineConfig itself, not part of any named sub-section
  // (Start/Kinematics/etc.), and not tied to any board resource -- so, like
  // Start/Kinematics, no annotate() comment either. Placed last in the
  // generated file since they're genuinely uncategorized. All 7 are
  // pre-populated with FluidNC's own compiled-in defaults (rarely changed),
  // editable inline -- same defaultOverrides mechanism as Start's
  // deactivate_parking/check_limits, not left as open TBDs.
  cfg.arc_tolerance_mm = "TBD";
  cfg.junction_deviation_mm = "TBD";
  cfg.verbose_errors = "TBD";
  cfg.report_inches = "TBD";
  cfg.enable_parking_override_control = "TBD";
  cfg.use_line_numbers = "TBD";
  cfg.planner_blocks = "TBD";
  paramDefaultOverrides["arc_tolerance_mm"] = { default: 0.002, defaultKind: "firmware" };
  paramDefaultOverrides["junction_deviation_mm"] = { default: 0.01, defaultKind: "firmware" };
  paramDefaultOverrides["verbose_errors"] = { default: true, defaultKind: "firmware" };
  paramDefaultOverrides["report_inches"] = { default: false, defaultKind: "firmware" };
  paramDefaultOverrides["enable_parking_override_control"] = { default: false, defaultKind: "firmware" };
  paramDefaultOverrides["use_line_numbers"] = { default: false, defaultKind: "firmware" };
  paramDefaultOverrides["planner_blocks"] = { default: 16, defaultKind: "firmware" };

  // Optional top-level sections with no board-resource correlation
  // (Parking/Macros/OLED/ATC Manual) -- see OPTIONAL_SECTIONS' own
  // declaration comment. Planted last, after every other cfg.* assignment
  // above, so they land at the END of the emitted file (js-yaml dumps
  // object keys in insertion order) rather than in the middle of the
  // board-derived sections. Sentinel is planted as its own KEY regardless
  // of enabled state, same "selector lives inside the draft itself"
  // pattern as kinematics/homing; when disabled the resolved clone deletes
  // the key entirely below, rather than emitting an empty block.
  Object.keys(OPTIONAL_SECTIONS).forEach(key => {
    cfg[sectionSentinel(key)] = sectionEnabled[key] ? OPTIONAL_SECTIONS[key].stub() : null;
  });

  // Work on a clone for the interactive view: it gets its pin leaves
  // overwritten with a "PINSLOT" sentinel (so we can splice in attribute
  // widgets at those positions) while every "TBD" slot is left untouched
  // and simply collected, exactly as before. `cfg` itself stays pristine.
  const liveCfg = JSON.parse(JSON.stringify(cfg));
  const paramSlots = [];
  const pinSlots = [];
  collectAndInjectSlots(liveCfg, "", paramSlots, pinSlots, paramDefaultOverrides);

  const yamlText = dequoteAxisKeys(annotateYaml(jsyaml.dump(liveCfg, { lineWidth: -1, noRefs: true })));
  const unresolved = paramSlots.filter(s => !Object.prototype.hasOwnProperty.call(paramValues, s.path)).length;

  document.getElementById("summary").innerHTML = `
    <div class="stat done"><b>${Object.values(bindings).filter(v=>v&&v!=="unused").length}</b>resource(s) bound</div>
    <div class="stat"><b>${countResources()}</b>total resources</div>
    <div class="stat tbd"><b>${unresolved}</b>remaining TBD (open params)</div>
  `;

  document.getElementById("draft").innerHTML = buildInteractiveYaml(yamlText, paramSlots, pinSlots);
  document.querySelectorAll("#draft .inline-field").forEach(el => {
    el.onchange = () => setParam(el.dataset.path, el.dataset.key, el.value);
  });
  document.querySelectorAll("#draft .default-btn").forEach(btn => {
    btn.onclick = () => setParamDefault(btn.dataset.path, btn.dataset.key);
  });
  document.querySelectorAll("#draft .clear-btn").forEach(btn => {
    btn.onclick = () => setParam(btn.dataset.path, btn.dataset.key, "");
  });
  document.querySelectorAll("#draft .attr-field").forEach(el => {
    el.onchange = () => setPinAttr(el.dataset.path, el.dataset.attr, el.value);
  });
  document.querySelectorAll("#draft .kin-select").forEach(el => {
    el.onchange = () => { kinematicsType = el.value; generateDraft(); };
  });
  document.querySelectorAll("#draft .homing-select").forEach(el => {
    el.onchange = () => { homingEnabled[el.dataset.letter] = el.value === "true"; generateDraft(); };
  });
  document.querySelectorAll("#draft .section-select").forEach(el => {
    el.onchange = () => { sectionEnabled[el.dataset.section] = el.value === "true"; generateDraft(); };
  });

  // Plain-text version (real values where answered, literal TBD where not,
  // pin attributes appended where set) for Copy/Download -- the <pre>
  // itself now holds live form widgets, so its textContent isn't usable.
  const resolved = JSON.parse(JSON.stringify(cfg));
  function setAtPath(path, value) {
    const segs = path.split(".");
    let node = resolved;
    for (let i = 0; i < segs.length - 1; i++) node = node[segs[i]];
    node[segs[segs.length - 1]] = value;
  }
  paramSlots.forEach(({ path }) => {
    if (Object.prototype.hasOwnProperty.call(paramValues, path)) setAtPath(path, paramValues[path]);
  });
  pinSlots.forEach(({ path, basePin }) => {
    const attrs = pinAttrs[path];
    if (!attrs) return;
    const suffix = (attrs.level ? `:${attrs.level}` : "") + (attrs.pull ? `:${attrs.pull}` : "");
    if (suffix) setAtPath(path, basePin + suffix);
  });
  // Undo the KINSELECT sentinel now that every subordinate-field path
  // referencing it (e.g. "kinematics.KINSELECT.crank_mm") has already been
  // resolved above -- cfg.kinematics's real key is always the selected
  // system's actual cfgKey (Cartesian/CoreXY/etc.), never the literal
  // sentinel text itself.
  if (resolved.kinematics && Object.prototype.hasOwnProperty.call(resolved.kinematics, "KINSELECT")) {
    resolved.kinematics = { [kt.cfgKey]: resolved.kinematics.KINSELECT };
  }
  // homing: is genuinely optional -- `cfg`/`resolved` never carry a real
  // "homing" key for a disabled axis at all, only the HOMINGSELECT_<letter>
  // sentinel key (see ensureAxis()/homingSentinel()). Rename that sentinel
  // to the real "homing" key when enabled (keeping its TBD-resolved
  // fields); delete it outright when disabled, so config.yaml genuinely
  // has no homing: section for that axis -- not an empty one, not a
  // placeholder.
  Object.keys(resolved.axes || {}).forEach(letter => {
    const ax = resolved.axes[letter];
    if (!ax || typeof ax !== "object") return;
    const sentinelKey = homingSentinel(letter);
    if (!Object.prototype.hasOwnProperty.call(ax, sentinelKey)) return;
    if (homingEnabled[letter]) ax.homing = ax[sentinelKey];
    delete ax[sentinelKey];
  });
  // Same rename-or-delete idea one level up, for the optional top-level
  // sections themselves (Parking/Macros/OLED/ATC Manual) -- see
  // OPTIONAL_SECTIONS' own declaration comment.
  Object.keys(OPTIONAL_SECTIONS).forEach(key => {
    const sentinelKey = sectionSentinel(key);
    if (!Object.prototype.hasOwnProperty.call(resolved, sentinelKey)) return;
    if (sectionEnabled[key]) resolved[key] = resolved[sentinelKey];
    delete resolved[sentinelKey];
  });
  lastPlainYaml = dequoteAxisKeys(annotateYaml(jsyaml.dump(resolved, { lineWidth: -1, noRefs: true })));
  // Keep the hotspot photo's assigned/unassigned colors and tooltips in
  // sync with whatever just changed -- generateDraft() runs on every
  // binding edit, so this stays live rather than only reflecting board-load
  // time. No-op (returns immediately) for boards with no hotspot data.
  refreshHotspotStates();
  // Same idea for GPIO-conflict disabling: recompute on every binding
  // change so assigning (or un-assigning) a resource immediately
  // disables/re-enables anything else sharing one of its physical pins.
  refreshGpioConflicts();
  // Same idea for role-uniqueness graying: recompute on every binding
  // change so claiming (or un-claiming) a role immediately disables/
  // re-enables that same option everywhere else it appears.
  refreshRoleUniqueness();
}

/* ---------------------------------------------------------------------
 * Import an existing config.yaml -- the reverse of generateDraft() above:
 * instead of walking bindings -> cfg, this walks a loaded cfg -> bindings
 * (plus paramValues for real values found, instead of leaving them TBD).
 * The loaded file's own `board:` field is checked against every known
 * board_id/board.name (see detectBoardId(), called from the file-input
 * handler below) and, on an exact case-insensitive match, the picker
 * auto-switches to it before importing -- covers the common case of a file
 * this tool itself produced (which always writes the board's real name into
 * `board:`), or a hand-written config using the id directly. When there's
 * no match (a free-text label, a board this tool doesn't know, or the field
 * is simply absent), the currently-selected board is used as-is and the
 * report notes that explicitly, so the user knows to double-check it.
 *
 * Per-field pin ATTRIBUTES (:low/:high/:pu/:pd suffixes) ARE re-imported
 * into pinAttrs, at the same param path collectAndInjectSlots will assign
 * once the draft is regenerated -- for motor-socket pins specifically, only
 * when the loaded driver type matches what this board's own socket data
 * implies (motorBlockFor() is board-derived, not a user choice, so a
 * mismatched driver type means the real eventual path is unknown; see the
 * "notes" entry generated in that case). Fixed-protocol pins (uartN:/i2c0:
 * -- see isFixedProtocolPath()) never carry attributes in the first place,
 * so none are attempted for those.
 *
 * Ambiguous pin ownership (a board's own documented dual-purpose pin, e.g.
 * Corgi's shared MOSFET/5V-out) is resolved via the "# <label>" comment
 * this tool's own exports write immediately above the pin (or above a
 * wrapping block that contains it, e.g. "# RS485" above "uart1:") -- see
 * buildPinLabelHints(). When exactly one candidate resource's own label
 * matches that comment, it's used with confidence; otherwise (no comment,
 * or the comment doesn't uniquely match) this falls back to picking the
 * first candidate and reporting the ambiguity, since there's no other
 * signal available -- expected for hand-written configs, which have no
 * reason to carry this tool's specific comment convention.
 *
 * Still deliberately out of scope for now: the older per-model top-level
 * VFD key form (e.g. `Huanyang:` instead of `ModbusVFD:` + `model:`) isn't
 * recognized, only the modern form.
 * ------------------------------------------------------------------- */

// resourceKeyRs485/resourceKeyExpUart/resourceKeyI2c all return distinctly
// prefixed strings ("rs485:", "expuart:", "i2c:") -- used below to tell
// which kind of resource a matched uart-bus pin actually belongs to, since
// the correct role STRING differs by resource type even though the pin
// lookup itself is generic.
function resourceKeyPrefix(key) { return key.split(":")[0]; }

function parsePinString(raw) {
  if (raw == null) return null;
  const s = String(raw).trim();
  if (!s || s === "NO_PIN") return null;
  const parts = s.split(":");
  const basePin = parts[0];
  let level = "", pull = "";
  parts.slice(1).forEach(a => {
    if (a === "low" || a === "high") level = a;
    else if (a === "pu" || a === "pd") pull = a;
  });
  return { basePin, level, pull };
}

function buildPinOwnerIndex() {
  const idx = {};
  Object.keys(resourcePins).forEach(key => {
    (resourcePins[key] || []).forEach(pin => {
      if (!pin) return;
      idx[pin] = idx[pin] || [];
      if (!idx[pin].includes(key)) idx[pin].push(key);
    });
  });
  return idx;
}

/* Scrapes "# <label>" comments out of the RAW config.yaml text (jsyaml.load
 * discards comments entirely, so this is a separate line-based pass over
 * the original file text) and maps each pin VALUE found to the label of
 * its nearest enclosing/preceding comment -- i.e. exactly the inverse of
 * generateDraft()'s own annotate()/annotateYaml() mechanism, which writes
 * a resource's board label as a "# <label>" comment immediately above
 * either the pin's own key (e.g. "# In2" above "limit_neg_pin: gpio.2") OR
 * above a wrapping block key that CONTAINS the pin (e.g. "# RS485" above
 * "uart1:", which contains "txd_pin: gpio.15" one level deeper) -- so this
 * scanner tracks a small indent-keyed stack of "nearest active comment",
 * not just the immediately preceding line, to catch both shapes.
 *
 * Only useful for files this tool (or something matching its comment
 * convention) produced -- a hand-written or differently-annotated
 * config.yaml simply won't match anything here, and importConfig() falls
 * back to its existing ambiguous-pin reporting in that case, per the
 * explicit direction that "if there is no such comment, there is still an
 * ambiguity." */
function buildPinLabelHints(rawText) {
  const hints = {}; // pin base value (e.g. "gpio.2") -> label
  const lines = String(rawText || "").split(/\r\n|\n|\r/);
  const commentRe = /^(\s*)#\s?(.*)$/;
  const kvRe = /^(\s*)[A-Za-z0-9_]+:\s*(.*?)\s*$/;
  const stack = []; // [{ indent, label }], nearest-enclosing comment per indent level
  let pendingComment = null; // { indent, label } for the line directly below a comment
  lines.forEach(line => {
    const cm = line.match(commentRe);
    if (cm) {
      pendingComment = { indent: cm[1].length, label: cm[2] };
      return;
    }
    const kv = line.match(kvRe);
    if (!kv) { pendingComment = null; return; }
    const indent = kv[1].length;
    const rawValue = kv[2];
    while (stack.length && stack[stack.length - 1].indent >= indent) stack.pop();
    let activeLabel = stack.length ? stack[stack.length - 1].label : null;
    if (pendingComment && pendingComment.indent === indent) {
      activeLabel = pendingComment.label;
      stack.push({ indent, label: pendingComment.label });
    }
    if (/^(gpio\.\d+|i2so\.\d+)$/.test(rawValue) && activeLabel) {
      hints[rawValue] = activeLabel;
    }
    pendingComment = null;
  });
  return hints;
}

/* Core of the importer: given a raw config.yaml document (already parsed
 * via jsyaml.load) and the ORIGINAL raw text (for comment-based pin
 * disambiguation, see buildPinLabelHints() above), populate
 * bindings/paramValues/pinAttrs/homingEnabled/kinematicsType and return a
 * { matched, ambiguous, unrecognized, notes } report for display. Resets
 * all import-relevant state first, same as loadBoard() does for a fresh
 * board load. */
function importConfig(doc, rawText) {
  bindings = {};
  paramValues = {};
  pinAttrs = {};
  homingEnabled = {};
  kinematicsType = "Cartesian";
  sectionEnabled = {};

  const report = { matched: [], ambiguous: [], unrecognized: [], notes: [] };
  const pinOwnerIndex = buildPinOwnerIndex();
  const pinLabelHints = buildPinLabelHints(rawText);

  function resolvePin(pinRaw, ctxLabel) {
    const parsed = parsePinString(pinRaw);
    if (!parsed) return null;
    const candidates = pinOwnerIndex[parsed.basePin] || [];
    if (!candidates.length) {
      report.unrecognized.push(`${ctxLabel}: pin ${parsed.basePin} not found on ${board.board.id}`);
      return null;
    }
    if (candidates.length > 1) {
      // Try to resolve via the "# <label>" comment (if any) the ORIGINAL
      // file had directly above this pin/its wrapping block -- if exactly
      // one candidate's own board label matches that hint, use it with
      // confidence instead of falling back to "just pick the first one."
      const hint = pinLabelHints[parsed.basePin];
      const hintMatches = hint ? candidates.filter(k => resourceLabels[k] === hint) : [];
      if (hintMatches.length === 1) {
        report.notes.push(`${ctxLabel}: pin ${parsed.basePin} was ambiguous (${candidates.length} candidates) but resolved via the "# ${hint}" comment -> ${hintMatches[0]}`);
        return { resourceKey: hintMatches[0], parsed };
      }
      report.ambiguous.push(
        hint
          ? `${ctxLabel}: pin ${parsed.basePin} matches ${candidates.length} resources (${candidates.join(", ")}); comment says "${hint}" but that doesn't uniquely match any of them -- used ${candidates[0]}, verify and re-bind manually if wrong`
          : `${ctxLabel}: pin ${parsed.basePin} matches ${candidates.length} resources (${candidates.join(", ")}), and no disambiguating comment was found -- used ${candidates[0]}, verify and re-bind manually if wrong`
      );
    }
    return { resourceKey: candidates[0], parsed };
  }

  function bind(resourceKey, role, ctxLabel) {
    if (bindings[resourceKey] && bindings[resourceKey] !== "unused" && bindings[resourceKey] !== role) {
      report.ambiguous.push(`${ctxLabel}: resource ${resourceKey} was already bound to "${bindings[resourceKey]}" by an earlier field -- overwritten with "${role}"`);
    }
    bindings[resourceKey] = role;
    report.matched.push(`${ctxLabel} -> ${resourceKey} (${role})`);
  }

  // attrPath: the exact param path pinAttrs should be keyed under for this
  // pin (matching what collectAndInjectSlots will build once the draft is
  // regenerated from the new bindings) -- defaults to ctxLabel, which
  // already IS that path for every call site except the motor-socket one
  // (see below), which passes its own more specific path explicitly.
  function claimPin(pinRaw, role, ctxLabel, attrPath) {
    const r = resolvePin(pinRaw, ctxLabel);
    if (!r) return null;
    bind(r.resourceKey, role, ctxLabel);
    const path = attrPath !== undefined ? attrPath : ctxLabel;
    if (path && (r.parsed.level || r.parsed.pull)) {
      pinAttrs[path] = { level: r.parsed.level, pull: r.parsed.pull };
    }
    return r.resourceKey;
  }

  // Copy every non-object, non-"TBD" scalar field from `src` into
  // paramValues, keyed by `${pathPrefix}.${field}`. Used for tuning-field
  // blocks (motor driver bodies, spindle stubs, homing, kinematics, etc.)
  // where the field NAMES are already known to line up with what
  // specForKey()/collectAndInjectSlots expect, since they're the real
  // config.yaml field names either way. Skipping literal "TBD" values
  // matters for files that are themselves a previous half-finished export
  // from this tool -- copying the literal string "TBD" into paramValues
  // would make collectAndInjectSlots' `hasOwnProperty(paramValues, path)`
  // check see it as "answered" (rendered green/filled) even though its
  // content is the same unresolved placeholder, rather than leaving it as
  // a genuinely open (yellow) TBD slot.
  function copyScalarParams(src, pathPrefix, skipKeys) {
    if (!src || typeof src !== "object") return;
    Object.keys(src).forEach(k => {
      if (skipKeys && skipKeys.has(k)) return;
      const v = src[k];
      if (v === null || typeof v === "object" || v === "TBD") return;
      paramValues[`${pathPrefix}.${k}`] = v;
    });
  }

  // --- axes: motor sockets, limit pins, axis-level tuning, homing ---
  const motorDriverKeys = new Set([
    "standard_stepper", "stepstick", "tmc_2130", "tmc_2208", "tmc_5160",
    "tmc_2209", "tmc_5160Pro", "tmc_2160Pro", "tmc_2160", "rc_servo",
    "solenoid", "dynamixel2", "null_motor",
  ]);
  const axisNonMotorKeys = new Set(["motor0", "motor1", "homing", "shared_stepper_disable_pin"]);
  Object.keys(doc.axes || {}).forEach(letter => {
    if (letter === "shared_stepper_disable_pin") return;
    const axisDoc = doc.axes[letter];
    if (!axisDoc || typeof axisDoc !== "object") return;
    if (!AXES.includes(letter)) {
      report.unrecognized.push(`axes.${letter}: not a recognized axis letter, skipped`);
      return;
    }

    ["motor0", "motor1"].forEach(slot => {
      const motorDoc = axisDoc[slot];
      if (!motorDoc || typeof motorDoc !== "object") return;
      const driverKey = Object.keys(motorDoc).find(k => motorDriverKeys.has(k));
      const driverBody = driverKey ? motorDoc[driverKey] : null;

      // Identify the physical motor socket via any one of its own pins
      // (step_pin preferred) -- all of a socket's pins share one
      // resourceKey (resourceKeyMotor(i)), so matching just one suffices.
      let resourceKey = null;
      if (driverBody) {
        const pinField = ["step_pin", "direction_pin", "disable_pin", "cs_pin"].find(f => driverBody[f]);
        if (pinField) {
          const r = resolvePin(driverBody[pinField], `axes.${letter}.${slot}`);
          if (r) resourceKey = r.resourceKey;
        }
      }
      if (!resourceKey) {
        report.unrecognized.push(`axes.${letter}.${slot}: no recognizable motor pin found, skipped`);
        return;
      }
      bind(resourceKey, `${letter}:${slot}`, `axes.${letter}.${slot}`);

      // Tuning params only copied if the loaded config's own driver type
      // matches what this board's own socket data says it should be
      // (motorBlockFor() is board-derived, not a user choice) -- otherwise
      // the field names wouldn't line up with the path the regenerated
      // draft will actually use, so the values would silently go nowhere.
      const socketIndex = Number(resourceKey.split(":")[1]);
      const socket = (board.motor_sockets && board.motor_sockets.sockets || [])[socketIndex];
      const expectedKey = socket ? motorBlockFor(socket).key : null;
      const motorPinFields = ["step_pin", "direction_pin", "disable_pin", "cs_pin"];
      if (driverKey && expectedKey && driverKey !== expectedKey) {
        report.notes.push(`axes.${letter}.${slot}: loaded config uses driver type "${driverKey}", but this board's own socket data implies "${expectedKey}" -- resource bound, but this socket's tuning fields and pin attributes were NOT copied (would land on the wrong regenerated path)`);
      } else if (driverBody) {
        copyScalarParams(driverBody, `axes.${letter}.${slot}.${driverKey}`, new Set(motorPinFields));
        // Per-pin :low/:high/:pu/:pd attributes -- only meaningful once the
        // driver-type match above confirms this exact path
        // (axes.<letter>.<slot>.<driverKey>.<field>) will really exist in
        // the regenerated draft.
        motorPinFields.forEach(f => {
          if (!driverBody[f]) return;
          const parsed = parsePinString(driverBody[f]);
          if (parsed && (parsed.level || parsed.pull)) {
            pinAttrs[`axes.${letter}.${slot}.${driverKey}.${f}`] = { level: parsed.level, pull: parsed.pull };
          }
        });
      }
    });

    ["motor0", "motor1"].forEach(slot => {
      const motorDoc = axisDoc[slot];
      if (!motorDoc || typeof motorDoc !== "object") return;
      [["limit_neg_pin", "neg"], ["limit_pos_pin", "pos"], ["limit_all_pin", "all"]].forEach(([field, which]) => {
        if (motorDoc[field] == null) return;
        claimPin(motorDoc[field], `limit:${letter}:${slot}:${which}`, `axes.${letter}.${slot}.${field}`);
      });
    });

    copyScalarParams(axisDoc, `axes.${letter}`, axisNonMotorKeys);

    if (axisDoc.homing && typeof axisDoc.homing === "object") {
      homingEnabled[letter] = true;
      copyScalarParams(axisDoc.homing, `axes.${letter}.${homingSentinel(letter)}`, null);
    }
  });

  // --- probe / control / user_inputs ---
  const probeDoc = doc.probe || {};
  ["pin", "toolsetter_pin"].forEach(field => {
    if (probeDoc[field] != null) claimPin(probeDoc[field], `probe:${field}`, `probe.${field}`);
  });

  const controlDoc = doc.control || {};
  Object.keys(controlDoc).forEach(field => {
    if (!field.endsWith("_pin")) return;
    const which = field.slice(0, -4);
    claimPin(controlDoc[field], `control:${which}`, `control.${field}`);
  });

  const userInputsDoc = doc.user_inputs || {};
  Object.keys(userInputsDoc).forEach(field => {
    const m = field.match(/^(digital|analog)(\d+)_pin$/);
    if (!m) return;
    claimPin(userInputsDoc[field], `user_input:${m[1]}:${m[2]}`, `user_inputs.${field}`);
  });

  // --- coolant ---
  const coolantDoc = doc.coolant || {};
  ["flood_pin", "mist_pin"].forEach(field => {
    if (coolantDoc[field] == null) return;
    const which = field.slice(0, -4);
    claimPin(coolantDoc[field], `coolant:${which}`, `coolant.${field}`);
  });

  // --- user_outputs (digital/analog outputs + status_outputs) ---
  const userOutputsDoc = doc.user_outputs || {};
  Object.keys(userOutputsDoc).forEach(field => {
    const m = field.match(/^(digital|analog)(\d+)_pin$/);
    if (!m) return;
    const [, kind, n] = m;
    const role = kind === "digital" ? `digital_output:${n}` : `analog_output:${n}`;
    const resourceKey = claimPin(userOutputsDoc[field], role, `user_outputs.${field}`);
    if (resourceKey && kind === "analog") {
      const hzField = `analog${n}_hz`;
      if (userOutputsDoc[hzField] != null && userOutputsDoc[hzField] !== "TBD") {
        paramValues[`user_outputs.${hzField}`] = userOutputsDoc[hzField];
      }
    }
  });

  const statusOutputsDoc = doc.status_outputs || {};
  Object.keys(statusOutputsDoc).forEach(field => {
    const m = field.match(/^(idle|run|hold|alarm|door)_pin$/);
    if (!m) return;
    claimPin(statusOutputsDoc[field], `status_output:${m[1]}`, `status_outputs.${field}`);
  });
  if (statusOutputsDoc.report_interval_ms != null && statusOutputsDoc.report_interval_ms !== "TBD") {
    paramValues["status_outputs.report_interval_ms"] = statusOutputsDoc.report_interval_ms;
  }

  // --- spindles: any top-level key matching a known SPINDLE_TYPES cfgKey ---
  Object.keys(SPINDLE_TYPES).forEach(typeId => {
    const def = SPINDLE_TYPES[typeId];
    const spindleDoc = doc[def.cfgKey];
    if (!spindleDoc || typeof spindleDoc !== "object") return;
    const pinFields = new Set();
    def.pins.forEach(([which]) => {
      const field = `${which}_pin`;
      pinFields.add(field);
      if (spindleDoc[field] != null) claimPin(spindleDoc[field], `spindle:${typeId}:${which}`, `${def.cfgKey}.${field}`);
    });
    copyScalarParams(spindleDoc, def.cfgKey, pinFields);
  });

  // --- RS485 -> Modbus VFD spindle (modern ModbusVFD: form only in v1;
  // the older per-model top-level key alias, e.g. Huanyang:, is not
  // recognized here yet) ---
  if (doc.ModbusVFD && typeof doc.ModbusVFD === "object") {
    const model = doc.ModbusVFD.model;
    const n = doc.ModbusVFD.uart_num;
    const uartBlock = doc[`uart${n}`];
    if (model && uartBlock && uartBlock.txd_pin != null) {
      // attrPath explicitly null: the pin actually lives in uartN:, a
      // fixed-protocol path (see isFixedProtocolPath()) that never gets
      // PINSLOT/attr treatment, and "ModbusVFD" itself isn't a real pin
      // leaf path -- nothing to attach attrs to here either way.
      claimPin(uartBlock.txd_pin, `vfd:${model}`, "ModbusVFD", null);
    } else {
      report.unrecognized.push("ModbusVFD: missing model/uart_num, or its referenced uartN: block, skipped");
    }
  }

  // --- expansion UART / I2C-as-UART: any uart_channelN: paired with a
  // uartN: block. Which resource type it resolves to (an actual expansion
  // UART connector vs. an I2C connector repurposed as one) determines the
  // correct role string, so the resourceKey's own prefix decides it. ---
  Object.keys(doc).forEach(key => {
    const m = key.match(/^uart_channel(\d+)$/);
    if (!m) return;
    const n = m[1];
    const uartBlock = doc[`uart${n}`];
    if (!uartBlock || uartBlock.txd_pin == null) {
      report.unrecognized.push(`${key}: no matching uart${n}: block with a txd_pin, skipped`);
      return;
    }
    const r = resolvePin(uartBlock.txd_pin, key);
    if (!r) return;
    const prefix = resourceKeyPrefix(r.resourceKey);
    if (prefix === "expuart") {
      bind(r.resourceKey, "uart_channel", key);
    } else if (prefix === "i2c") {
      bind(r.resourceKey, "expansion_uart", key);
    } else {
      report.ambiguous.push(`${key}: txd_pin resolved to ${r.resourceKey}, which is neither an expansion UART nor I2C connector -- skipped`);
    }
    if (doc[key].report_interval_ms != null && doc[key].report_interval_ms !== "TBD") {
      paramValues[`${key}.report_interval_ms`] = doc[key].report_interval_ms;
    }
  });

  // --- bare I2C bus --- (attrPath explicitly null: i2c0's pins are a
  // fixed-protocol path, see isFixedProtocolPath(), never PINSLOT-eligible)
  if (doc.i2c0 && doc.i2c0.sda_pin != null) {
    claimPin(doc.i2c0.sda_pin, "i2c_bus", "i2c0", null);
  }

  // --- kinematics ---
  if (doc.kinematics && typeof doc.kinematics === "object") {
    const sysKey = Object.keys(doc.kinematics)[0];
    const matchedTypeId = Object.keys(KINEMATICS_TYPES).find(t => KINEMATICS_TYPES[t].cfgKey === sysKey);
    if (matchedTypeId) {
      kinematicsType = matchedTypeId;
      copyScalarParams(doc.kinematics[sysKey], "kinematics.KINSELECT", null);
    } else if (sysKey) {
      report.notes.push(`kinematics: unrecognized system "${sysKey}", left as Cartesian`);
    }
  }

  // --- start / stepping / uncategorized top-level scalars, and name: ---
  // (name: is set unconditionally to "TBD" by generateDraft() itself, same
  // open-TBD mechanism as these others -- not tied to any board resource.)
  if (doc.name != null && doc.name !== "TBD") paramValues.name = doc.name;
  if (doc.start) copyScalarParams(doc.start, "start", null);
  if (doc.stepping) copyScalarParams(doc.stepping, "stepping", new Set(["engine"]));
  [
    "arc_tolerance_mm", "junction_deviation_mm", "verbose_errors", "report_inches",
    "enable_parking_override_control", "use_line_numbers", "planner_blocks",
  ].forEach(key => {
    if (doc[key] != null && doc[key] !== "TBD") paramValues[key] = doc[key];
  });

  // --- optional top-level sections with no board correlation: parking /
  // macros / oled / atc_manual --- mirrors the KINSELECT/homing sentinel
  // convention above: presence of the real section key in the loaded doc
  // means the selector should come back enabled, and its scalar params are
  // stored under the SECTIONSELECT_<key> sentinel path (same path the
  // sentinel occupies in `cfg` itself, see OPTIONAL_SECTIONS/generateDraft()).
  Object.keys(OPTIONAL_SECTIONS).forEach(key => {
    if (doc[key] && typeof doc[key] === "object") {
      sectionEnabled[key] = true;
