      copyScalarParams(doc[key], sectionSentinel(key), null);
      report.matched.push(key);
    }
  });

  return report;
}

function renderImportReport(report, filename, boardNote) {
  const panel = document.getElementById("importReport");
  const total = report.matched.length;
  let html = "";
  if (boardNote) html += `<div>${escapeHtml(boardNote)}</div>`;
  html += `<b>Loaded ${escapeHtml(filename)}:</b> ${total} resource(s) matched`;
  if (report.ambiguous.length) html += `, ${report.ambiguous.length} ambiguous`;
  if (report.unrecognized.length) html += `, ${report.unrecognized.length} unrecognized`;
  html += `. <button onclick="document.getElementById('importReport').style.display='none'">Dismiss</button>`;
  if (report.ambiguous.length || report.unrecognized.length || report.notes.length) {
    html += `<details><summary>Details</summary><ul>`;
    report.ambiguous.forEach(m => html += `<li><b>Ambiguous:</b> ${escapeHtml(m)}</li>`);
    report.unrecognized.forEach(m => html += `<li><b>Unrecognized:</b> ${escapeHtml(m)}</li>`);
    report.notes.forEach(m => html += `<li><b>Note:</b> ${escapeHtml(m)}</li>`);
    html += `</ul></details>`;
  }
  panel.innerHTML = html;
  panel.style.display = "block";
}

/* Best-effort match of a loaded config's own `board:` field back to one of
 * this tool's board_ids, so the picker can auto-switch instead of relying
 * on the user to have pre-selected the right board. Two passes: a direct
 * board_id match first (covers a hand-written config that happens to use
 * the id itself), then a match against each board file's own human-
 * readable `board.name` -- generateDraft() itself writes `cfg.board =
 * board.board.name`, so this is the common case for files this tool
 * produced. Both passes are case-insensitive, exact-match only (no fuzzy
 * matching -- a near-miss should fall through to "couldn't auto-detect"
 * rather than silently guess a different board). */
async function detectBoardId(doc) {
  const raw = doc && doc.board;
  if (!raw || typeof raw !== "string") return null;
  const target = raw.trim().toLowerCase();
  const idHit = BOARD_IDS.find(id => id.toLowerCase() === target);
  if (idHit) return idHit;
  const entries = await Promise.all(BOARD_IDS.map(async id => {
    const text = await fetchYamlTextOptional(`boards/${id}.board.yaml`);
    if (!text) return null;
    try {
      const parsed = jsyaml.load(text);
      return { id, name: parsed.board && parsed.board.name };
    } catch (e) {
      return null;
    }
  }));
  const nameHit = entries.find(e => e && typeof e.name === "string" && e.name.trim().toLowerCase() === target);
  return nameHit ? nameHit.id : null;
}

document.getElementById("configFileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    let doc;
    try {
      doc = jsyaml.load(reader.result);
    } catch (err) {
      document.getElementById("importReport").style.display = "block";
      document.getElementById("importReport").innerHTML =
        `<b>Couldn't parse ${escapeHtml(file.name)}:</b> ${escapeHtml(err.message)}`;
      return;
    }
    if (!doc || typeof doc !== "object") {
      document.getElementById("importReport").style.display = "block";
      document.getElementById("importReport").innerHTML = `<b>${escapeHtml(file.name)} doesn't look like a config.yaml (empty or not a mapping).</b>`;
      return;
    }

    const priorBoardId = board && board.board && board.board.id;
    const detectedId = await detectBoardId(doc);
    let boardNote = null;
    if (detectedId && detectedId !== priorBoardId) {
      await loadBoard(detectedId);
      document.getElementById("boardPicker").value = detectedId;
      boardNote = `Auto-detected board from config's "board: ${doc.board}" -- switched to ${detectedId}.`;
    } else if (detectedId) {
      boardNote = `Config's "board: ${doc.board}" matches the currently selected board (${detectedId}).`;
    } else if (!priorBoardId) {
      // No board loaded yet (nothing is preselected at boot -- see boot())
      // and the config's own "board:" field, if any, didn't match a known
      // board either -- there's nothing to bind pins against yet.
      document.getElementById("importReport").style.display = "block";
      document.getElementById("importReport").innerHTML = doc.board
        ? `<b>Config's "board: ${escapeHtml(doc.board)}" didn't match any known board.</b> Pick a board above first, then re-load this file.`
        : `<b>This config.yaml has no "board:" field to auto-detect from.</b> Pick a board above first, then re-load this file.`;
      return;
    } else if (doc.board) {
      boardNote = `Config's "board: ${doc.board}" didn't match any known board -- using the currently selected board (${priorBoardId}); verify pin bindings look right.`;
    }

    const report = importConfig(doc, reader.result);
    renderResources();
    renderHotspotPane();
    wireHotspotHoverLinks();
    generateDraft();
    renderImportReport(report, file.name, boardNote);
  };
  reader.onerror = () => {
    document.getElementById("importReport").style.display = "block";
    document.getElementById("importReport").innerHTML = `<b>Couldn't read ${escapeHtml(file.name)}.</b>`;
  };
  reader.readAsText(file);
  e.target.value = ""; // allow re-selecting the same file later
});

/* js-yaml (correctly, per the YAML 1.1 spec it follows) quotes a bare
 * mapping key equal to a "y"/"n"/"on"/"off"/etc. bool-like word, to avoid
 * ambiguity with an actual boolean -- which is why the Y axis alone comes
 * out as 'y': while every other axis letter doesn't. FluidNC's own config
 * files/docs never quote axis names this way, so this strips the quotes
 * js-yaml adds specifically around AXES letters used as mapping keys
 * (leaving any other, unrelated quoting js-yaml does untouched). */
function dequoteAxisKeys(text) {
  return AXES.reduce((t, ax) => t.replace(new RegExp(`^(\\s*)(['"])${ax}\\2:`, "gm"), `$1${ax}:`), text);
}

/* Converts every "__ANNOTATE_FOR_<key>__: <label>" line js-yaml dumped
 * (see annotate() above) into a "# <label>" comment on the same line,
 * preserving whatever indentation js-yaml gave it -- since each marker was
 * inserted as an ordinary SIBLING key immediately before the one real key
 * it's meant to caption (never nested inside it), this lands the comment
 * directly above that key at the same nesting level, whether that's a
 * whole aggregate block (a motor socket's motor0:/motor1:, an RS485/
 * expansion UART's uartN:/uart_channelN:/ModbusVFD:) or a single pin field
 * (a limit/probe/control/user_input/spindle/coolant/digital-output pin) --
 * each marker is tied to exactly one resource, so there's never a multi-
 * label line to join. Strips a layer of quotes if js-yaml quoted the
 * label. */
function annotateYaml(text) {
  return text.split("\n").map(line => {
    const m = /^(\s*)__ANNOTATE_FOR_[A-Za-z0-9_]+__:\s*(.*)$/.exec(line);
    if (!m) return line;
    let label = m[2].trim();
    if ((label.startsWith("'") && label.endsWith("'")) || (label.startsWith('"') && label.endsWith('"'))) {
      label = label.slice(1, -1);
    }
    return `${m[1]}# ${label}`;
  }).join("\n");
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function copyDraft() {
  navigator.clipboard.writeText(lastPlainYaml);
}

function downloadDraft() {
  const blob = new Blob([lastPlainYaml], { type: "text/yaml" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${board.board.id}.config.yaml`;
  a.click();
}

/* ---------------------------------------------------------------------
 * Boot
 * ------------------------------------------------------------------- */
const picker = document.getElementById("boardPicker");
// Placeholder option -- nothing is preselected/auto-loaded at boot (see
// boot() below), so there needs to be a real "no board chosen yet" option
// for the picker to actually show, rather than silently defaulting to
// whichever real board happens to be first in BOARD_IDS.
const placeholderOpt = document.createElement("option");
placeholderOpt.value = "";
placeholderOpt.textContent = "— Select a board —";
picker.appendChild(placeholderOpt);
BOARD_IDS.forEach(id => {
  const o = document.createElement("option");
  o.value = id; o.textContent = id;
  picker.appendChild(o);
});
picker.onchange = () => { if (picker.value) loadBoard(picker.value); };

// The role-tree/vocabulary data derived from schema/fluidnc-config-schema.json
// is global/board-independent, so it's loaded (and derived) once here before
// the first board, rather than per-loadBoard() like boards/chips/hotspots.
// Everything downstream (renderResources(), makeInputRow(), etc.) depends on
// INPUT_ROLE_TREE/SPINDLE_TYPES/etc. being populated, so loadBoard() must not
// run until this resolves.
async function boot() {
  try {
    await loadRoleData();
  } catch (e) {
    document.getElementById("resourceCol").innerHTML = `<div class="note">` +
      `Couldn't load schema/fluidnc-config-schema.json (${escapeAttr(e.message)}). If you opened this page ` +
      `via a file:// URL, browsers block fetch() of local files -- serve this folder over HTTP instead ` +
      `(e.g. "python3 -m http.server" from a terminal here, then open http://localhost:8000/index.html).</div>`;
    return;
  }
  // No board is preselected/auto-loaded -- the user picks one explicitly
  // via the picker (or loads an existing config.yaml, which auto-detects
  // and selects its board for them, see configFileInput's change handler).
  document.getElementById("boardNote").textContent = "Pick a board above to begin, or load an existing config.yaml.";
}
boot();
</script>
</body>
