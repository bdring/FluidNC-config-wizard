<style>
  :root {
    --bg: #0f1417; --panel: #171e23; --border: #2a343b; --text: #dbe4e8;
    --muted: #7d8f98; --accent: #4fb5c9; --tbd: #d9a441; --fixed: #5c7d63; --danger: #e0616b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header p { margin: 0; color: var(--muted); font-size: 12.5px; }
  select, button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 6px 10px; font-size: 13px; font-family: inherit;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #06181c; font-weight: 600; border-color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 61px); }
  /* Widened by renderHotspotPane() (JS, inline style) to 3 columns only
     when the loaded board has a hotspots/<id>.hotspots.yaml file -- most
     boards don't yet, so this stays the default 2-column layout for those. */
  .col { overflow-y: auto; padding: 18px 24px; }
  .col.left { border-right: 1px solid var(--border); }
  section { margin-bottom: 22px; }
  section h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .row {
    display: grid; grid-template-columns: 1fr 200px; gap: 10px; align-items: center;
    padding: 6px 0;
  }
  .row .lbl { display: flex; flex-direction: column; }
  .row .lbl .name { font-weight: 600; }
  .row .lbl .sub { color: var(--muted); font-size: 11.5px; margin-top: 1px; }
  .row.gpio-conflict select { opacity: 0.5; cursor: not-allowed; }
  .row select { width: 100%; }
  .row.output-row, .row.cascade-row { grid-template-columns: 1fr 260px; }
  .output-controls, .cascade-controls { display: flex; gap: 4px; }
  .output-controls select, .cascade-controls select { flex: 1; min-width: 0; }
  /* Each row's selector(s) live inside a small positioned wrapper (.ctrl-wrap
     for a single-select row, or the existing .output-controls/.cascade-
     controls for the two multi-select row types) so .conflict-note --
     appended as a child of that SAME wrapper, not the row as a whole -- can
     use inset:0 to cover exactly the selector portion of the row and
     nothing else (never the name/sub text on the left). See
     refreshGpioConflicts(). Opaque background so the selector underneath is
     fully hidden, not just dimmed; only ever shown on an UNASSIGNED
     resource, disappears (selector reappears) the instant the conflicting
     resource reverts to Unused. */
  .ctrl-wrap { position: relative; }
  .output-controls, .cascade-controls { position: relative; }
  .conflict-note {
    display: none; position: absolute; inset: 0;
    align-items: center; padding: 0 8px;
    background: var(--panel); color: var(--danger); font-size: 11.5px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-radius: 5px;
  }
  .fixed-fact { color: var(--text); font-weight: 600; }
  .fixed-list { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .fixed-list code { color: var(--fixed); background: none; }
  code { background: #0a1013; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  pre#draft {
    background: #0a1013; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; font-size: 12.5px; line-height: 1.55; overflow-x: auto;
    white-space: pre; min-height: 200px;
  }
  .tbd-token { color: var(--tbd); font-weight: 700; }
  .summary { display: flex; gap: 18px; margin-bottom: 12px; font-size: 12.5px; }
  .summary .stat b { font-size: 16px; display: block; }
  .summary .stat.tbd b { color: var(--tbd); }
  .summary .stat.done b { color: #6fbf73; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .note {
    font-size: 12px; color: var(--muted); background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 16px;
  }
  .inline-field {
    font: inherit; font-size: 12.5px; font-family: inherit; color: var(--tbd);
    background: #1c262c; border: 1px solid var(--tbd); border-radius: 3px;
    padding: 0 4px; margin: 0 1px;
  }
  .inline-field.filled { color: #6fbf73; border-color: #6fbf73; }
  .inline-field:focus { outline: none; border-color: var(--accent); }
  input.inline-field { width: 9ch; }
  select.inline-field { max-width: 22ch; }
  .inline-field::placeholder { color: var(--muted); }
  .inline-btn {
    font: inherit; font-size: 10.5px; line-height: 1; cursor: pointer;
    background: var(--panel); color: var(--muted); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 4px; margin: 0 1px; vertical-align: middle;
  }
  .inline-btn:hover { color: var(--text); border-color: var(--accent); }
  .inline-btn.default-btn:hover { color: #6fbf73; border-color: #6fbf73; }
  .inline-btn.clear-btn:hover { color: #d9694a; border-color: #d9694a; }
  .attr-field {
    font: inherit; font-size: 10.5px; background: var(--panel); color: var(--muted);
    border: 1px solid var(--border); border-radius: 3px; padding: 0 2px; margin-left: 1px;
  }
  .attr-field.set { color: var(--accent); border-color: var(--accent); }
  .kin-select {
    font: inherit; font-size: 12.5px; font-family: inherit; color: var(--text);
    background: #1c262c; border: 1px solid var(--border); border-radius: 3px;
    padding: 0 2px; margin-left: -4px;
  }
  /* section-select sits at the true left margin (a top-level key, like
     start:/stepping:), same as kin-select above -- the browser's default
     <select> box adds a few px of left padding/border that a plain text
     key doesn't have, so without this it visually reads as indented one
     level even though the underlying YAML key is at column 0. */
  .section-select {
    font: inherit; font-size: 12.5px; font-family: inherit; color: var(--text);
    background: #1c262c; border: 1px solid var(--border); border-radius: 3px;
    padding: 0 2px; margin-left: -4px;
  }
  .col.hotspot { border-right: 1px solid var(--border); }
  #hotspotImgWrap { position: relative; display: inline-block; max-width: 100%; }
  #hotspotImgWrap img { max-width: 100%; display: block; user-select: none; -webkit-user-drag: none; }
  #hotspotOverlay { position: absolute; inset: 0; }
  /* Color encodes binding state, not just hover: yellow (--tbd, same color
     the rest of the wizard already uses for "open/TBD") for a connector
     with no role assigned yet, green for one that does -- refreshed live
     on every generateDraft() (see refreshHotspotStates()), not just at
     board-load time. Magenta is reserved exclusively for "this is the one
     you just clicked" (.active), so it always reads as a distinct
     selection state, never confusable with the assigned/unassigned color. */
  .hotspot-rect {
    position: absolute; box-sizing: border-box; cursor: pointer;
    border: 3px solid var(--tbd); background: rgba(217,165,60,.14);
    transition: background .15s, border-color .15s;
  }
  .hotspot-rect.assigned { border-color: #6fbf73; background: rgba(111,191,115,.16); }
  .hotspot-rect:hover, .hotspot-rect.hover { background: rgba(217,165,60,.34); }
  .hotspot-rect.assigned:hover, .hotspot-rect.assigned.hover { background: rgba(111,191,115,.34); }
  .hotspot-rect.active { border-color: #e63cc8 !important; background: rgba(230,60,200,.30) !important; }
  /* Resource name shown right inside the box. Deliberately allowed to
     overflow (no truncation/ellipsis/font shrinking yet -- long labels on
     small connectors will spill past the box edges for now, a known,
     accepted rough spot to revisit later) rather than hiding any of the
     text. A dark backing chip keeps it legible over any of the box's
     yellow/green/magenta fill states. pointer-events: none so it never
     steals the click/hover that's meant for the rect itself. */
  .hotspot-label {
    position: absolute; top: 2px; left: 2px; z-index: 2; pointer-events: none;
    font-size: 10px; line-height: 1.3; color: #f2f6f8; background: rgba(10,16,19,.72);
    padding: 1px 4px; border-radius: 2px; white-space: nowrap; overflow: visible;
  }
  /* The connector's OWN name (e.g. "Motor1") always shows as the corner
     chip above (.hotspot-label, unconditional). .hotspot-role-label is a
     different thing: the FluidNC ROLE that's been assigned to that
     connector (e.g. "X Motor" / "Limit X-"), shown only once a hotspot has
     an editor-authored label_rect AND the connector is actually bound to
     something -- positioned at that separate rect (same %-of-image space
     as the connector box, not nested inside it) rather than the connector
     box's own corner, since small/crowded connectors often have no room
     for both their own name and the assigned role. Text content/visibility
     is refreshed live by refreshHotspotStates(), same as the connector
     box's assigned/unassigned coloring. label_orientation: "vertical"
     rotates the text to read bottom-to-top; still allowed to overflow past
     the rect for now (same "fix later" stance as the corner chip). */
  .hotspot-role-label {
    position: absolute; z-index: 2; pointer-events: none; padding: 1px 4px;
    font-size: 10px; line-height: 1.25; color: #f2f6f8; background: rgba(10,16,19,.72);
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; text-align: center; white-space: normal;
    word-break: break-word; overflow: visible; box-sizing: border-box;
    border-radius: 2px;
  }
  .hotspot-role-label.vertical {
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
  }
  .hotspot-role-label:empty { display: none; }
  .row.hotspot-target {
    background: rgba(230,60,200,.16); outline: 2px solid #e63cc8; outline-offset: 2px; border-radius: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>FluidNC Board Mapping Wizard</h1>
  <p>Prototype — resource-first walk (Phase A: bind board resources to roles) → draft config.yaml with TBD stubs (Phase B)</p>
  <select id="boardPicker" style="margin-left:auto"></select>
  <button onclick="document.getElementById('configFileInput').click()">Load config.yaml…</button>
  <input type="file" id="configFileInput" accept=".yaml,.yml,text/yaml" style="display:none">
</header>

<main>
  <div class="col left" id="resourceCol">
    <div class="note" id="boardNote"></div>
    <div class="note" id="importReport" style="display:none"></div>
  </div>
  <div class="col hotspot" id="hotspotCol" style="display:none">
    <!-- Populated by renderHotspotPane() only when hotspots/<id>.hotspots.yaml
         exists for the loaded board (currently just Corgi, as a prototype)
         -- hidden and excluded from the grid entirely otherwise. -->
  </div>
  <div class="col right">
    <div class="summary" id="summary"></div>
    <div class="toolbar">
      <button class="primary" onclick="copyDraft()">Copy</button>
      <button onclick="downloadDraft()">Download .yaml</button>
    </div>
    <pre id="draft">Bind some resources on the left -- the draft updates live.</pre>
  </div>
</main>

<script>
/* ---------------------------------------------------------------------
 * Board/chip/hotspot data now lives in real sidecar files, fetched at
 * runtime, instead of being embedded as JS string literals in this file.
 * This trades away the ability to preview the wizard in an environment
 * that can't fetch relative files (e.g. pasted into a chat sidebar) for a
 * shape that actually matches the real project layout (fluidnc-boards'
 * boards/*.board.yaml, chips/*.chip.yaml) and lets board/hotspot data be
 * edited without touching this file at all.
 *
 * IMPORTANT: fetch() of relative files is blocked by the browser's CORS
 * policy when this page is opened directly via a file:// URL (Chrome
 * included) -- there's no way around that from the page itself. To run
 * this locally, serve the folder over HTTP, e.g. from a terminal in this
 * folder: `python3 -m http.server 8000`, then open
 * http://localhost:8000/index.html. It also works as-is once pushed to
 * GitHub Pages, since that serves over real HTTP(S).
 *
 * BOARD_IDS is a manifest, not a directory listing -- fetch() can't
 * enumerate a folder's contents, so the wizard needs to be told which
 * board files exist. Keep this in sync with boards/*.board.yaml.
 * ------------------------------------------------------------------- */
const BOARD_IDS = [
  "6x_cnc_controller", "4x_cnc_controller", "corgi_cnc_controller",
  "fluidnc_pen_laser_spi", "mks_dlc32_v2_1", "btt_rodent_v1_0", "btt_rodent_v1_1",
];

async function fetchYamlText(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
  return res.text();
}

// Returns null (not a throw) for optional per-board files -- a missing
// hotspots file is expected for every board except Corgi so far, and
// should silently fall back to no hotspot pane, not break board loading.
async function fetchYamlTextOptional(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return null;
    return await res.text();
  } catch (e) {
    return null;
  }
}


/* ---------------------------------------------------------------------
 * Role vocabularies. Real FluidNC has a larger set; this prototype covers
 * enough of it to demonstrate the resource-first walk + TBD stubbing.
 * ------------------------------------------------------------------- */
/* AXES / MOTOR_ROLE_TREE / INPUT_ROLE_TREE / SPINDLE_TYPES /
 * DIGITAL_OUTPUT_COUNT / ANALOG_OUTPUT_COUNT are derived at boot directly
 * from FluidNC's own authoritative fluidnc-config-schema.json (a versioned
 * copy lives at schema/fluidnc-config-schema.json in this repo, fetched
 * once -- see loadRoleData() below), rather than from a hand-generated
 * role-data.yaml sidecar. There used to be a two-step pipeline here (a
 * Python script read the schema and wrote role-data.yaml, which the wizard
 * then fetched) -- collapsed into one step per feedback ("consider doing
 * the work at runtime in javascript so there is no need for a cached role
 * file"): the exact same derivation logic now runs live in the browser
 * every time the page loads, so there's no intermediate artifact that can
 * go stale by someone forgetting to re-run a generator.
 *
 * What's still hand-authored here (the schema has no concept of these --
 * they're UI vocabulary, not config-file structure): AXES, MOTOR_LABELS,
 * LIMIT_DIRECTIONS (axis/motor-as-a-selectable-thing is a wizard UI
 * grouping choice, not a schema concept), SPINDLE_LABELS + the few
 * *_LABEL_OVERRIDES maps (display text the schema doesn't carry), and
 * STATUS_OUTPUT_PINS (fluidnc-config-schema.json has NO status_outputs
 * section at all, despite it being a real registered config key --
 * confirmed in the connected FluidNC source, Status_outputs.cpp's own
 * ConfigurableModuleFactory::InstanceBuilder<Status_Outputs>
 * registration("status_outputs") -- this looks like a genuine gap in the
 * schema itself; loadRoleData() below checks for it every load and
 * console.warns if it's ever added, so this comment doesn't silently go
 * stale).
 *
 * What's still hardcoded LOGIC, not data at all: the tree-CONSTRUCTION
 * shape below (e.g. "build one Limit branch per axis, each with a
 * motor0/motor1 level under it") and generateDraft()'s per-role dispatch
 * (which config.yaml field(s) a given leaf path writes to) -- tied to
 * FluidNC's config schema, not expressible as passive data without
 * inventing a schema language. */
const AXES = ["x", "y", "z", "a", "b", "c"];
const MOTOR_LABELS = { motor0: "First Motor", motor1: "Second Motor" };
const LIMIT_DIRECTIONS = { neg: "Negative", pos: "Positive", all: "(shared/all)" };
const SPINDLE_LABELS = {
  pwm: "PWM", laser: "Laser", "10v": "0-10V", relay: "Relay (on/off)",
  dac: "DAC", besc: "BESC (RC ESC)", hbridge: "H-Bridge",
};
const CONTROL_LABEL_OVERRIDES = {
  estop: "E-Stop", macro0: "Macro Button 0", macro1: "Macro Button 1",
  macro2: "Macro Button 2", macro3: "Macro Button 3",
};
const PROBE_LABEL_OVERRIDES = { pin: "Probe", toolsetter_pin: "Toolsetter" };
const SPINDLE_PIN_LABEL_OVERRIDES = { output_cw: "Output CW", output_ccw: "Output CCW" };
const COMMON_TUNING_FIELDS = new Set([
  "tool_num", "speed_map", "off_on_alarm", "atc", "m6_macro", "s0_with_disable",
  "disable_with_s0", "spinup_ms", "spindown_ms", "pwm_hz", "min_pulse_us", "max_pulse_us",
]);
const STUB_FIELD_LITERALS = { tool_num: 0 }; // every other stub field -> "TBD"
const STATUS_OUTPUT_PINS = [
  ["idle", "Idle"], ["run", "Run"], ["hold", "Hold"], ["alarm", "Alarm"], ["door", "Door"],
];

function titleLabel(fieldKey) {
  return fieldKey.split("_").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
}
function stripPinSuffix(key) {
  return key.endsWith("_pin") ? key.slice(0, -4) : key;
}

// MOTOR_ROLE_TREE and INPUT_ROLE_TREE.limit depend only on the
// hand-authored vocabulary above (no schema fetch needed), so they're built
// synchronously here rather than inside loadRoleData().
const MOTOR_ROLE_TREE = Object.fromEntries(AXES.map(ax => [ax, {
  label: `${ax.toUpperCase()} axis`,
  children: Object.fromEntries(Object.keys(MOTOR_LABELS).map(m => [m, { label: MOTOR_LABELS[m] }])),
}]));

function buildLimitBranch() {
  return {
    label: "Limit",
    children: Object.fromEntries(AXES.map(ax => [ax, {
      label: `${ax.toUpperCase()} axis`,
      children: Object.fromEntries(Object.keys(MOTOR_LABELS).map(m => [m, {
        label: MOTOR_LABELS[m],
        children: Object.fromEntries(Object.keys(LIMIT_DIRECTIONS).map(dir => [dir, { label: LIMIT_DIRECTIONS[dir] }])),
      }])),
    }])),
  };
}

/* Everything below DOES need the fetched schema: which pins Probe/Control
 * actually expose, how many User Input/Output slots exist, and each
 * spindle type's real pin set + tuning-field list. Mirrors
 * generate_role_data.py's logic exactly (that script is retired now that
 * this runs live, but its header comment has the fuller rationale for each
 * choice below if it's ever useful to consult in FluidNC-config-wizard's
 * git history). */
function buildControlTree(schema) {
  const props = schema.$defs.controlSection.properties;
  const children = {};
  Object.keys(props).forEach(fullKey => {
    const key = stripPinSuffix(fullKey);
    children[key] = { label: CONTROL_LABEL_OVERRIDES[key] || titleLabel(key) };
  });
  return { label: "Control", children };
}

function buildProbeTree(schema) {
  const props = schema.$defs.probeSection.properties;
  const children = {};
  ["pin", "toolsetter_pin"].forEach(fullKey => {
    if (fullKey in props) children[fullKey] = { label: PROBE_LABEL_OVERRIDES[fullKey] };
  });
  return { label: "Probe", children };
}

function countSlots(props, prefix) {
  return Object.keys(props).filter(k => k.startsWith(prefix) && k.endsWith("_pin")).length;
}

function buildUserInputTree(schema) {
  const props = schema.$defs.userInputsSection.properties;
  const digitalCount = countSlots(props, "digital");
  const analogCount = countSlots(props, "analog");
  return {
    label: "User Input",
    children: {
      digital: {
        label: "Digital",
        children: Object.fromEntries(Array.from({ length: digitalCount }, (_, i) => [String(i), { label: `Digital ${i}` }])),
      },
      analog: {
        label: "Analog",
        children: Object.fromEntries(Array.from({ length: analogCount }, (_, i) => [String(i), { label: `Analog ${i}` }])),
      },
    },
  };
}

function buildSpindleTypes(schema) {
  const defs = schema.$defs;
  const result = {};
  Object.keys(defs).forEach(defName => {
    if (!defName.startsWith("spindle_")) return;
    const cfgKey = defName.slice("spindle_".length);
    const typeId = cfgKey.toLowerCase();
    if (!(typeId in SPINDLE_LABELS)) return; // OnOff / PlasmaSpindle / NoSpindle / ModbusVFD -- unmodeled by design
    const props = defs[defName].properties || {};
    const pins = [];
    const stubFields = [];
    Object.keys(props).forEach(fullKey => {
      if (fullKey.endsWith("_pin")) {
        const key = stripPinSuffix(fullKey);
        pins.push([key, SPINDLE_PIN_LABEL_OVERRIDES[key] || titleLabel(key)]);
      } else if (COMMON_TUNING_FIELDS.has(fullKey)) {
        stubFields.push([fullKey, fullKey in STUB_FIELD_LITERALS ? STUB_FIELD_LITERALS[fullKey] : "TBD"]);
      }
    });
    result[typeId] = {
      label: SPINDLE_LABELS[typeId],
      cfgKey,
      pins,
      stub: () => Object.fromEntries(stubFields),
    };
  });
  // Stable, deliberate dropdown order (schema $defs order isn't what we want in the UI).
  const order = ["pwm", "laser", "10v", "relay", "dac", "besc", "hbridge"];
  const ordered = {};
  order.forEach(t => { if (result[t]) ordered[t] = result[t]; });
  return ordered;
}

function checkSchemaForKnownGaps(schema) {
  if (!("status_outputs" in (schema.properties || {}))) {
    console.warn(
      "fluidnc-config-schema.json has no status_outputs section (STATUS_OUTPUT_PINS stays " +
      "hand-authored against the FluidNC source directly) -- if this ever appears, the schema " +
      "gap noted in this file's comments has been fixed and STATUS_OUTPUT_PINS could move to " +
      "schema-derived too."
    );
  }
  // (userOutputsSection's analogN_hz fields used to have no wizard UI
  // counterpart -- fixed by specForKey()'s analogN_hz case + generateDraft()'s
  // analog_output dispatch stubbing it as an open TBD, so there's nothing
  // left to warn about here.)
}

let INPUT_ROLE_TREE, SPINDLE_TYPES, DIGITAL_OUTPUT_COUNT, ANALOG_OUTPUT_COUNT;

async function loadRoleData() {
  const schemaText = await fetchYamlText("schema/fluidnc-config-schema.json");
  const schema = JSON.parse(schemaText);

  checkSchemaForKnownGaps(schema);

  INPUT_ROLE_TREE = {
    limit: buildLimitBranch(),
    probe: buildProbeTree(schema),
    control: buildControlTree(schema),
    user_input: buildUserInputTree(schema),
  };
  SPINDLE_TYPES = buildSpindleTypes(schema);
  DIGITAL_OUTPUT_COUNT = countSlots(schema.$defs.userOutputsSection.properties, "digital");
  ANALOG_OUTPUT_COUNT = countSlots(schema.$defs.userOutputsSection.properties, "analog");
}

/* Generic two-step cascade lookup: given a step-1 category value, returns
 * the step-2 [value,label] options for it, or null if that category is
 * already a complete, non-cascading choice (coolant, unused). Spindle
 * types and digital outputs both go through this same mechanism -- it's
 * what keeps the primary dropdown from growing every time either set
 * grows (a new spindle type, or wanting more digital output slots). */
function cascadeOptionsFor(category) {
  if (category.startsWith("spindle:")) {
    const type = category.split(":")[1];
    return SPINDLE_TYPES[type] ? SPINDLE_TYPES[type].pins : null;
  }
  if (category === "digital_output") {
    return Array.from({ length: DIGITAL_OUTPUT_COUNT }, (_, i) => [String(i), `Output ${i}`]);
  }
  if (category === "analog_output") {
    return Array.from({ length: ANALOG_OUTPUT_COUNT }, (_, i) => [String(i), `Output ${i}`]);
  }
  if (category === "status_output") {
    return STATUS_OUTPUT_PINS;
  }
  return null;
}

/* Top-level category options for an output-capable pin -- step 1 of the
 * two-step menu. Spindle types and "Digital Output" are cascading
 * categories (picking one reveals step 2); coolant is already a single
 * flat choice per option, same as before. */
function outputCategoryOptions() {
  const opts = [{ value: "unused", label: "— Unused —" }];
  Object.keys(SPINDLE_TYPES).forEach(t => opts.push({ value: `spindle:${t}`, label: `Spindle — ${SPINDLE_TYPES[t].label}` }));
  opts.push({ value: "coolant:flood", label: "Coolant — Flood" });
  opts.push({ value: "coolant:mist", label: "Coolant — Mist" });
  opts.push({ value: "digital_output", label: "Digital Output" });
  opts.push({ value: "analog_output", label: "Analog Output" });
  opts.push({ value: "status_output", label: "Status Output" });
  return opts;
}

/* Split a full role value into its category (step 1) and, for cascading
 * categories, the specific sub-value chosen in step 2. */
function roleCategory(full) {
  if (!full || full === "unused") return "unused";
  const parts = full.split(":");
  if (parts[0] === "spindle") return `spindle:${parts[1]}`;
  if (parts[0] === "digital_output") return "digital_output";
  if (parts[0] === "analog_output") return "analog_output";
  if (parts[0] === "status_output") return "status_output";
  return full;
}
function roleSubValue(full) {
  const parts = (full || "").split(":");
  if (parts[0] === "spindle") return parts[2];
  if (parts[0] === "digital_output") return parts[1];
  if (parts[0] === "analog_output") return parts[1];
  if (parts[0] === "status_output") return parts[1];
  return undefined;
}

/* The model choice fully determines the resulting block's shape (the
 * modern FluidNC form is a single ModbusVFD: block with a model: field --
 * the old per-model top-level key like Huanyang: still works but is
 * strictly a backwards-compatibility alias), so it's folded into the
 * resource's role choice itself rather than asked as a separate Phase B
 * fill-in, same pattern as fixed_motor_type dispatching a motor socket's
 * wrapper key. Model list is every concrete VFD model implemented under
 * FluidNC/src/Spindles/VFD/ in the bdring/FluidNC source as of this
 * writing (confirmed against the actual repo, not from memory) -- re-check
 * that directory if this needs to grow later. */
function rs485RoleOptions() {
  const models = [
    "DanfossVLT2800", "DeltaMS300", "FolinnBD600", "H100", "H2A",
    "Huanyang", "MollomG70", "NowForever", "SiemensV20", "YL620"
  ];
  return [
    { value: "unused", label: "— Unused —" },
    ...models.map(m => ({ value: `vfd:${m}`, label: `Modbus VFD Spindle — ${m}` }))
  ];
}

/* Kinematics is a machine-level (not board-resource-tied) choice -- every
 * board can, in principle, host any kinematic system, so unlike motor
 * sockets/pins/RS485 this isn't walked from board.* facts. Confirmed
 * against the connected FluidNC source: Kinematics::afterParse() defaults
 * _system to a plain Cartesian when the config's "kinematics:" section (or
 * its subordinate system name) is absent, so Cartesian-with-no-subordinate-
 * items is the correct, real default -- not just a UI convenience. Other
 * compiled-in systems (see src/CMakeLists.txt's Kinematics/*.cpp list;
 * PolarArm.hx and the .cppx/.orig files alongside them are NOT compiled)
 * each register under a specific factory name and some define their own
 * subordinate config items via group() -- CoreXY and Midtbot genuinely
 * have empty group() overrides (no subordinate items at all), while
 * ParallelDelta and WallPlotter each expose a real, fixed set of geometry
 * fields. cfgKey is each type's exact registered factory name (case-
 * sensitive, confirmed from each .cpp's `KinematicsFactory::InstanceBuilder
 * registration("...")` call -- note midtbot/parallel_delta are lowercase,
 * unlike Cartesian/CoreXY/WallPlotter). stub() returns exactly the fields
 * each type's real group() exposes, TBD-stubbed like every other role. */
const KINEMATICS_TYPES = {
  Cartesian:      { cfgKey: "Cartesian", label: "Cartesian (default)", stub: () => ({}) },
  CoreXY:         { cfgKey: "CoreXY", label: "CoreXY", stub: () => ({}) },
  midtbot:        { cfgKey: "midtbot", label: "Midtbot", stub: () => ({}) },
  parallel_delta: { cfgKey: "parallel_delta", label: "Parallel Delta",
                    stub: () => ({
                      crank_mm: "TBD", base_triangle_mm: "TBD", linkage_mm: "TBD",
                      end_effector_triangle_mm: "TBD", kinematic_segment_len_mm: "TBD",
                      use_servos: "TBD", up_degrees: "TBD",
                    }) },
  WallPlotter:    { cfgKey: "WallPlotter", label: "Wall Plotter",
                    stub: () => ({
                      left_axis: "TBD", left_anchor_x: "TBD", left_anchor_y: "TBD",
                      right_axis: "TBD", right_anchor_x: "TBD", right_anchor_y: "TBD",
                      segment_length: "TBD",
                    }) },
};

function kinematicsOptions() {
  return Object.keys(KINEMATICS_TYPES).map(k => ({ value: k, label: KINEMATICS_TYPES[k].label }));
}

/* Optional top-level sections with no board-resource correlation at all
 * (no pins, nothing to bind on the left pane) -- Parking, Macros, OLED,
 * ATC Manual. Same "selector lives inside the draft itself" pattern as
 * Homing (see homingEnabled/ensureAxis()/homingWidgetHtml()): each gets a
 * sectionSentinel(key) planted as its own KEY in `cfg` (see generateDraft()
 * below), which a <select> replaces in the interactive view -- when
 * disabled, no trace of the real section key appears anywhere, not even an
 * empty block (a genuinely absent section is different from an empty one).
 * Field lists/defaults confirmed against fluidnc-config-schema.json's
 * macrosSection/parkingSection/oledSection/atc_manual $defs.
 *
 * atc_manual is referenced BY NAME from a spindle's own `atc:` field (see
 * SPINDLE_TYPES' stub_fields, specForKey's "atc" case) -- enabling this
 * section doesn't automatically fill that field in for you; the user still
 * has to type the literal string "atc_manual" into whichever spindle's atc:
 * field wants to reference it (same "click def, or type your own" pattern
 * as every other open text field, not a special-cased link between the two).
 *
 * "Perhaps others" beyond these four: extenders: is deprecated (not worth
 * adding a first-class toggle for a feature under active removal); every
 * other genuinely optional top-level section this schema knows about
 * (control/coolant/probe/user_outputs/user_inputs/spindle types/
 * status_outputs) IS resource-bound and already has its own left-pane
 * row(s) instead. */
const OPTIONAL_SECTIONS = {
  parking: {
    label: "Parking",
    stub: () => ({
      enable: "TBD", axis: "TBD", target_mpos_mm: "TBD", rate_mm_per_min: "TBD",
      pullout_distance_mm: "TBD", pullout_rate_mm_per_min: "TBD",
    }),
  },
  macros: {
    label: "Macros",
    stub: () => ({
      startup_line0: "TBD", startup_line1: "TBD",
      macro0: "TBD", macro1: "TBD", macro2: "TBD", macro3: "TBD",
      after_homing: "TBD", after_reset: "TBD", after_unlock: "TBD",
    }),
  },
  oled: {
    label: "OLED",
    stub: () => ({
      report_interval_ms: "TBD", i2c_num: "TBD", i2c_address: "TBD",
      width: "TBD", height: "TBD", flip: "TBD", mirror: "TBD", radio_delay_ms: "TBD",
    }),
  },
  atc_manual: {
    label: "ATC Manual",
    stub: () => ({
      safe_z_mpos_mm: "TBD", probe_seek_rate_mm_per_min: "TBD", probe_feed_rate_mm_per_min: "TBD",
      change_mpos_mm: "TBD", ets_mpos_mm: "TBD", ets_rapid_z_mpos_mm: "TBD",
    }),
  },
};
function sectionSentinel(key) { return `SECTIONSELECT_${key}`; }
let sectionEnabled = {};   // section key -> bool, defaults to false (falsy) if unset

/* Confirmed against real vendor documentation (4x controller wiki's own
 * "UARTS" section, verbatim): "UART0 is used for the USB/Serial port.
 * UART1 is used for the TMC2209 drivers. UART2 is the only one left to the
 * user. This means if you use it for the RS485, there are non left for
 * pendants, display, etc." -- i.e. a board with UART-addressed onboard TMC
 * drivers (detected via any motor socket's extra.bus === "uart1", a real
 * board fact already recorded for such boards) has already consumed
 * uart_num 1, so the one remaining non-USB UART for RS485/expansion is 2;
 * a board without such drivers (6x, Corgi) defaults to 1. This is a
 * WIZARD-level default, applied identically to whichever of RS485/
 * expansion UART a config actually binds -- deliberately NOT arbitrated
 * further than that, because on a TMC-UART board both would default to
 * the same remaining number 2 and only one can really be used at once
 * (confirmed by the 4x wiki's own commented-out RS485 example, which
 * literally warns "Be sure pendant is not using UART 2" and uses
 * uart_num: 2 for RS485 in that scenario) -- a genuine hardware limit (the
 * ESP32 only has 3 UART peripherals total), not a wizard bug to engineer
 * around. */
function boardHasUartTmc(b) {
  return !!(b.motor_sockets && b.motor_sockets.sockets &&
    b.motor_sockets.sockets.some(s => s.extra && s.extra.bus === "uart1"));
}
function defaultSecondaryUartNum(b) {
  return boardHasUartTmc(b) ? 2 : 1;
}

/* ---------------------------------------------------------------------
 * State
 * ------------------------------------------------------------------- */
let board = null;          // parsed board object
let bindings = {};         // resourceKey -> role value string
let paramValues = {};      // JSON-pointer-ish path (e.g. "axes.x.steps_per_mm") -> user-entered value
let pinAttrs = {};         // path -> { level: ""|"low"|"high", pull: ""|"pu"|"pd" }
let kinematicsType = "Cartesian"; // selected top-level kinematics system, defaults to Cartesian
/* Start: is another machine-level (not board-resource-tied) section, same
 * category as Kinematics -- confirmed against the connected FluidNC source
 * (Machine::Start, defined inline in src/Machine/MachineConfig.h): a plain
 * Configurable with exactly 3 bool fields, no enum/factory involved:
 * must_home/check_limits default true, deactivate_parking defaults false
 * (MachineConfig.h's own member initializers). The section itself is
 * optional in config.yaml (MachineConfig::afterParse() auto-instantiates a
 * default Start() if absent), but the wizard always emits it directly into
 * the draft (see generateDraft()'s Start block) with must_home left open
 * TBD (a real decision) and the other two pre-populated with these same
 * compiled-in defaults, editable inline -- no separate left-pane UI state
 * needed for this section at all. */
let chipGpioCaps = {};     // gpio number -> chip-file gpio fact object (see loadBoard()/pinWidgetHtml())
let hotspotData = null;    // parsed hotspots/<id>.hotspots.yaml, or null if this board has no photo hotspots yet
// resourceKey -> [pin, pin, ...] -- every MCU pin string (e.g. "gpio.4",
// "i2so.2") a given resource physically occupies, regardless of which role
// (if any) it's currently bound to. Static per board load (see
// computeResourcePins(), called from loadBoard()); used by
// refreshGpioConflicts() to detect two DIFFERENT resources that share a
// physical pin -- the real-world case this exists for is a board's own
// documented dual-purpose connector (e.g. Corgi's gpio.4 is both a plain
// "5V Out (shared w/ MOSFET1)" pin and a "MOSFET1" driver pin -- same wire,
// two resource entries, pick one).
let resourcePins = {};
// resourceKey -> the board's own human label for it (socket.label/pin.label/
// etc.) -- same universe of keys as resourcePins, populated alongside it in
// computeResourcePins(). Used by the config.yaml importer to disambiguate a
// pin shared by multiple resources: generateDraft()'s own annotate() calls
// write this exact label into a "# <label>" comment above the pin in
// exported files, so a loaded file's comments can be matched back against
// this map to resolve an otherwise-ambiguous pin with confidence, when the
// file being imported is (or resembles) one this tool itself produced.
let resourceLabels = {};
let lastPlainYaml = "";    // current draft as plain text (TBD where still unanswered) -- for copy/download
/* Per-axis homing: presence -- FluidNC's homing: sub-section is genuinely
 * optional (an axis with no homing: entry simply can't be homed), so unlike
 * the always-present axis fields (steps_per_mm etc.), it should NOT be
 * pre-populated with TBD stubs for every axis by default. Same "selector
 * lives inside the draft itself" pattern as Kinematics (see KINSELECT):
 * ensureAxis() plants a HOMINGSELECT_<letter> sentinel as homing:'s own
 * VALUE (unlike KINSELECT, which replaces a KEY, this replaces a VALUE --
 * homing:'s value is what varies, not its key name -- so no colon-stripping
 * trick is needed here; it's collected/replaced exactly like TBD/PINSLOT).
 * Defaults to false (No homing) for every axis until the user explicitly
 * turns it on; the final copy/download output omits the homing: key
 * entirely for any axis left disabled, rather than emitting the sentinel
 * or an empty/TBD block. */
let homingEnabled = {};    // axis letter -> bool, defaults to false (falsy) if unset

/* Any leaf whose key names a pin (ends in "_pin", or is exactly "pin" for
 * probe.pin) and whose value is a real, board-derived pin reference (not
 * the TBD sentinel, not NO_PIN -- there's nothing to attribute-tag on
 * either of those) is eligible for FluidNC pin attributes like :low/:pu. */
function isPinLeaf(key, value) {
  if (typeof value !== "string") return false;
  if (value === "TBD" || value === "NO_PIN") return false;
  return key.endsWith("_pin") || key === "pin";
}

/* Pins feeding a fixed hardware protocol/bus -- spi:, sdcard:, i2so:, i2c:,
 * and any uartN: block (whether from a dedicated onboard TMC bus, an
 * RS485/VFD channel, or an expansion_uart's uart_channel) -- are not
 * eligible for :low/:high/:pu/:pd attributes at all: the protocol itself
 * dictates specific, fixed signal levels/timing (SPI/I2S clock polarity,
 * UART idle-high framing at a specific baud, etc.), so there's no
 * per-machine choice to make here, unlike a limit switch or spindle output
 * pin. These render as plain, non-widget text in the draft. Distinct from
 * motor_sockets/generic_pins/expansion_sockets/rs485_channels pins, which
 * ARE real per-machine wiring choices (active-low switch, pull resistor
 * needed, etc.) and keep their attribute widgets. */
function isFixedProtocolPath(path) {
  // NOTE: i2c0/i2c1/etc. (numbered, matching the real FluidNC config key --
  // see the i2c_connectors handling in generateDraft()) intentionally IS
  // still treated as a fixed-protocol bus here, even though whether it's
  // used at all is now a config-author choice (no longer a fixed
  // peripheral): once bound, its sda_pin/scl_pin are still I2C-protocol
  // pins with fixed signal requirements, same reasoning as spi/sdcard/i2so.
  return /^(spi|sdcard|i2so|i2c\d*)\./.test(path) || /^uart\d+\./.test(path);
}

/* ---------------------------------------------------------------------
 * Phase B field vocabulary: how to render a widget for a given open TBD,
 * keyed by the leaf key name. Real FluidNC has more fields than this
 * prototype models; unknown keys fall back to a plain text box.
 * ------------------------------------------------------------------- */
function specForKey(key) {
  // defaultKind: "firmware"  -- this is FluidNC's own documented default
  //              "suggested" -- just a common/reasonable starting point,
  //                             not a spec value -- verify for your hardware
  // Placeholder is always just the default value itself -- no separate
  // hand-written hint text to keep in sync.
  const numeric = (def, defaultKind) => ({ type: "number", placeholder: String(def), default: def, defaultKind });
  // analog0_hz..analogN_hz (userOutputsSection, N driven by ANALOG_OUTPUT_COUNT)
  // -- per-channel analog output PWM frequency, real schema default 5000,
  // range 1-20000000. Matched by pattern rather than one case per index
  // since the count itself comes from the schema, not a fixed literal here.
  if (/^analog\d+_hz$/.test(key)) return numeric(5000, "firmware");
  switch (key) {
    case "soft_limits":
      return { type: "enum", options: [["true","true — Yes"], ["false","false — No"]], default: "false", defaultKind: "firmware" };
    // Machine::Start's 3 fields (src/Machine/MachineConfig.h) -- must_home
    // is left with no override (an open decision), deactivate_parking/
    // check_limits get one in generateDraft() (pre-populated, editable).
    case "must_home":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "deactivate_parking":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "check_limits":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    // MachineConfig's 7 uncategorized top-level items (MachineConfig.cpp:
    // 83-89 / MachineConfig.h member initializers) -- see their
    // defaultOverrides entries in generateDraft(), which pre-populate
    // these from the real compiled-in defaults below rather than leaving
    // them open.
    case "arc_tolerance_mm": return numeric(0.002, "firmware");
    case "junction_deviation_mm": return numeric(0.01, "firmware");
    case "verbose_errors":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "report_inches":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "enable_parking_override_control":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "use_line_numbers":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "planner_blocks": return numeric(16, "firmware");
    case "cycle":
      return numeric(1, "suggested");
    case "positive_direction":
      return { type: "enum", options: [["true","true — Positive (toward max)"], ["false","false — Negative (toward min)"]], default: "false", defaultKind: "firmware" };
    case "mpos_mm": return numeric(0, "suggested");
    case "feed_mm_per_min": return numeric(100, "suggested");
    case "seek_mm_per_min": return numeric(200, "suggested");
    case "settle_ms": return numeric(500, "firmware");
    case "seek_scaler": return numeric(1.1, "firmware");
    case "feed_scaler": return numeric(1.1, "firmware");
    case "microsteps":
      return { type: "enum", options: [1,2,4,8,16,32,64,128,256].map(n => [String(n), String(n)]), default: "16", defaultKind: "suggested" };
    case "idle_ms": return numeric(255, "firmware");
    case "pulse_us": return numeric(4, "firmware");
    case "dir_delay_us": return numeric(1, "firmware");
    case "disable_delay_us": return numeric(0, "firmware");
    case "steps_per_mm": return numeric(100, "suggested");
    case "max_rate_mm_per_min": return numeric(5000, "suggested");
    case "acceleration_mm_per_sec2": return numeric(100, "suggested");
    case "max_travel_mm": return numeric(300, "suggested");
    case "r_sense_ohms": return numeric(0.11, "suggested");
    case "run_amps": return numeric(1.0, "suggested");
    case "hold_amps": return numeric(0.5, "suggested");
    case "cal_min_mm": return numeric(0, "suggested");
    case "cal_max_mm": return numeric(30, "suggested");
    case "pwm_hz": return numeric(5000, "firmware");
    case "spinup_ms": case "spindown_ms": return numeric(0, "firmware");
    case "tool_num": return numeric(0, "firmware");
    case "speed_map": return { type: "text", placeholder: "0=0% 10000=100%", default: "0=0% 10000=100%", defaultKind: "firmware" };
    // Common to every SPINDLE_TYPES entry (see COMMON_TUNING_FIELDS in
    // buildSpindleTypes()) -- real schema defaults confirmed against
    // fluidnc-config-schema.json's spindle_* $defs, off_on_alarm/
    // s0_with_disable/disable_with_s0's "default" keys.
    case "off_on_alarm":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "s0_with_disable":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "disable_with_s0":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    // atc: string, no "default" key in the schema at all (unlike the 3
    // booleans above) -- absence just means "no ATC block used", so an
    // empty string is the natural, if not schema-confirmed, starting
    // point; marked "suggested" rather than "firmware" to be honest that
    // this isn't a documented default the way the booleans are.
    case "atc": return { type: "text", placeholder: "", default: "", defaultKind: "suggested" };
    // m6_macro: macroLine's own schema description says explicitly that
    // an empty string (or an absent key) both mean "do nothing" -- a real,
    // spec-documented default, not just a placeholder guess.
    case "m6_macro": return { type: "text", placeholder: "", default: "", defaultKind: "firmware" };
    case "addr": return numeric(0, "suggested");
    case "modbus_id": return numeric(1, "suggested");
    case "min_pulse_us": return numeric(900, "firmware");
    case "max_pulse_us": return numeric(2200, "firmware");
    case "uart_num": return numeric(2, "suggested");
    // Only ever open TBD fields for a repurposed I2C-connector-as-UART
    // (see i2c_connectors handling in generateDraft()) -- a dedicated
    // expansion_uart connector's baud/mode are fixed board facts instead,
    // never TBD. 115200/8N1 are plain common-UART conventions, not a
    // FluidNC-specific default.
    case "baud": return numeric(115200, "suggested");
    case "mode": return { type: "text", placeholder: "8N1", default: "8N1", defaultKind: "suggested" };
    // Status_Outputs' real compiled default (Status_outputs.h: int32_t
    // _report_interval_ms = 500), confirmed against the connected FluidNC
    // source -- also used, as a reasonable starting point, for
    // uart_channel's field of the same name (whose own real default isn't
    // separately verified, but 75ms from wiki examples wasn't a firmware
    // default either).
    case "report_interval_ms": return numeric(500, "firmware");
    // ParallelDelta geometry -- defaults are the compiled-in member
    // initializers in Kinematics/ParallelDelta.h, confirmed against the
    // connected FluidNC source (a specific delta arm's real dimensions,
    // not universal -- every real machine must override these).
    case "crank_mm": return numeric(70.0, "firmware");
    case "base_triangle_mm": return numeric(179.437, "firmware");
    case "linkage_mm": return numeric(133.50, "firmware");
    case "end_effector_triangle_mm": return numeric(86.603, "firmware");
    case "kinematic_segment_len_mm": return numeric(1.0, "firmware");
    case "use_servos": return { type: "enum", options: [["true","true — Yes"], ["false","false — No"]], default: "false", defaultKind: "firmware" };
    case "up_degrees": return numeric(-30, "firmware");
    // WallPlotter geometry -- same provenance (Kinematics/WallPlotter.h
    // member initializers), a specific two-cord layout, not universal.
    case "left_axis": return numeric(0, "firmware");
    case "left_anchor_x": return numeric(-100, "firmware");
    case "left_anchor_y": return numeric(100, "firmware");
    case "right_axis": return numeric(1, "firmware");
    case "right_anchor_x": return numeric(100, "firmware");
    case "right_anchor_y": return numeric(100, "firmware");
    case "segment_length": return numeric(10, "firmware");
    // Parking (parkingSection $def, Machine/Parking.h member initializers) --
    // real compiled-in defaults confirmed against the connected FluidNC
    // source.
    case "enable":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "axis":
      return { type: "enum", options: [["x","x"],["y","y"],["z","z"],["a","a"],["b","b"],["c","c"]], default: "z", defaultKind: "firmware" };
    case "target_mpos_mm": return numeric(-5.0, "firmware");
    case "rate_mm_per_min": return numeric(800.0, "firmware");
    case "pullout_distance_mm": return numeric(5.0, "firmware");
    case "pullout_rate_mm_per_min": return numeric(250.0, "firmware");
    // Macros (macrosSection $def) -- every field is a macroLine, same
    // "empty string / absent key both mean do nothing" schema-documented
    // default as m6_macro above.
    case "startup_line0": case "startup_line1":
    case "macro0": case "macro1": case "macro2": case "macro3":
    case "after_homing": case "after_reset": case "after_unlock":
      return { type: "text", placeholder: "", default: "", defaultKind: "firmware" };
    // OLED (oledSection $def) -- real compiled-in defaults confirmed
    // against the connected FluidNC source (report_interval_ms already
    // has its own case above, shared with uart_channel).
    case "i2c_num": return numeric(0, "firmware");
    case "i2c_address": return numeric(60, "firmware");
    case "width": return numeric(64, "firmware");
    case "height": return numeric(48, "firmware");
    case "flip":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "mirror":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "radio_delay_ms": return numeric(0, "firmware");
    // ATC Manual ($defs.atc_manual) -- real compiled-in defaults confirmed
    // against the connected FluidNC source. change_mpos_mm/ets_mpos_mm are
    // floatArray (space-separated "x y z", no brackets/commas) and are
    // deliberately left with NO default -- genuinely machine-specific, per
    // the schema's own field description.
    case "safe_z_mpos_mm": return numeric(50.0, "firmware");
    case "probe_seek_rate_mm_per_min": return numeric(200.0, "firmware");
    case "probe_feed_rate_mm_per_min": return numeric(80.0, "firmware");
    case "ets_rapid_z_mpos_mm": return numeric(0.0, "firmware");
    case "change_mpos_mm": case "ets_mpos_mm":
      return { type: "text", placeholder: "0.0 0.0 0.0" };
    default: return { type: "text", placeholder: "" };
  }
}

/* Walk a freshly-cloned cfg and, in one pass, in the same order jsyaml.dump
 * will visit it: (a) record every "TBD" slot as before, and (b) replace
 * every real pin leaf with the sentinel "PINSLOT" (recording its original
 * value), so the dumped text's tokens can be swapped for widgets below.
 * This mutates `node` -- always call it on a clone, never the real cfg. */
/* defaultOverrides: optional path -> {default, defaultKind} map, for the
 * rare TBD field whose sensible default genuinely varies by BOARD (or even
 * by specific motor socket), not just by field name -- e.g. r_sense_ohms
 * is normally a generic per-driver-family guess (specForKey's plain
 * default), but a board can document its own, verified-correct value for
 * its own onboard chips (e.g. BTT Rodent's real 0.075 ohm sense resistor,
 * vs. the erroneous 0.022 its own schematic/example configs show) -- see
 * where motorBlockFor()'s tmc_5160 branch records such an override during
 * the motor-socket loop in generateDraft(). Merged over specForKey(k)'s
 * result so unrelated fields are unaffected. */
function collectAndInjectSlots(node, path, paramSlots, pinSlots, defaultOverrides) {
  if (!node || typeof node !== "object") return;
  Object.keys(node).forEach(k => {
    const v = node[k];
    const p = path ? `${path}.${k}` : k;
    if (v === "TBD") {
      const override = defaultOverrides && defaultOverrides[p];
      // NOTE: also re-derive placeholder from the override's own default --
      // otherwise the merge below only changes spec.default/defaultKind
      // (used by the "def" button), while the input's visible placeholder
      // text -- what the user actually sees without clicking anything --
      // would keep showing specForKey(k)'s generic value (e.g. 0.11 for any
      // r_sense_ohms field) instead of the board's real, overriding one
      // (e.g. BTT Rodent's documented 0.075), silently defeating the whole
      // point of a board-specific override.
      const spec = override
        ? Object.assign({}, specForKey(k), override, { placeholder: String(override.default) })
        : specForKey(k);
      // A board-specific override isn't a mere suggestion the way
      // specForKey's generic per-field guesses are -- it's a documented,
      // verified-correct fact about THIS board's own hardware (e.g. the
      // Rodent's real 0.075 ohm sense resistor). So unlike an ordinary
      // TBD field (which stays open until the user clicks "def" or types a
      // value), an overridden field is pre-filled as the actual current
      // value immediately -- no click required -- rather than left as a
      // placeholder the user must notice and act on. Only pre-fills if the
      // user hasn't already set (or explicitly cleared) this exact path,
      // so a real edit is never silently clobbered.
      if (override && override.default !== undefined &&
          !Object.prototype.hasOwnProperty.call(paramValues, p)) {
        paramValues[p] = override.default;
      }
      paramSlots.push({ path: p, key: k, spec });
    } else if (isPinLeaf(k, v) && !isFixedProtocolPath(p)) {
      pinSlots.push({ path: p, key: k, basePin: v });
      node[k] = "PINSLOT";
    } else if (v && typeof v === "object") {
      collectAndInjectSlots(v, p, paramSlots, pinSlots, defaultOverrides);
    }
  });
}

// Distinct from setParam(): the "def" button always means "apply this
// field's known default value," even when that default IS the empty
// string (e.g. atc/m6_macro -- a real, meaningful value here, "no ATC
// block"/"do nothing", not "unset"). setParam() itself treats an empty
// rawValue as "clear back to TBD" (the right behavior for a user manually
// blanking a text input), so reusing it for the default button would
// silently no-op on any field whose default happens to be "". Goes
// straight to paramValues instead of through that ambiguous convention.
function setParamDefault(path, key) {
  const spec = specForKey(key);
  if (spec.default === undefined) return;
  paramValues[path] = spec.default;
  generateDraft();
}

function setParam(path, key, rawValue) {
  const spec = specForKey(key);
  if (rawValue === "" || rawValue === undefined) {
    delete paramValues[path];
  } else if (spec.type === "number") {
    const n = Number(rawValue);
    if (Number.isNaN(n)) delete paramValues[path]; else paramValues[path] = n;
  } else if (spec.type === "enum" && (rawValue === "true" || rawValue === "false")) {
    paramValues[path] = rawValue === "true";
  } else if (spec.type === "enum") {
    const n = Number(rawValue);
    paramValues[path] = Number.isNaN(n) ? rawValue : n;
  } else {
    paramValues[path] = rawValue;
  }
  generateDraft();
}

function setPinAttr(path, which, value) {
  if (!pinAttrs[path]) pinAttrs[path] = { level: "", pull: "" };
  pinAttrs[path][which] = value;
  generateDraft();
}

function escapeAttr(s) {
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
}

function paramWidgetHtml(slot) {
  const has = Object.prototype.hasOwnProperty.call(paramValues, slot.path);
  const cls = "inline-field" + (has ? " filled" : "");
  let html;
  if (slot.spec.type === "enum") {
    const cur = has ? String(paramValues[slot.path]) : "";
    let opts = `<option value="">TBD</option>`;
    slot.spec.options.forEach(([val, label]) => {
      opts += `<option value="${escapeAttr(val)}"${val === cur ? " selected" : ""}>${escapeHtml(label)}</option>`;
    });
    html = `<select class="${cls}" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}">${opts}</select>`;
  } else {
    const cur = has ? paramValues[slot.path] : "";
    const type = slot.spec.type === "number" ? "number" : "text";
    const step = slot.spec.type === "number" ? ` step="any"` : "";
    // Once answered (has === true), the "TBD" placeholder is dropped
    // entirely rather than just recolored -- an empty, answered field
    // (e.g. atc/m6_macro's real "" default) would otherwise still show
    // "TBD" as ghost text, indistinguishable at a glance from a genuinely
    // still-open field despite the border/text color already having
    // changed. Only ever shown for a real UNANSWERED field.
    const placeholder = has ? "" : (slot.spec.placeholder || "TBD");
    html = `<input class="${cls}" type="${type}"${step} placeholder="${escapeAttr(placeholder)}" value="${escapeAttr(cur)}" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}">`;
  }
  if (slot.spec.default !== undefined) {
    const kindLabel = slot.spec.defaultKind === "firmware" ? "FluidNC firmware default"
      : slot.spec.defaultKind === "board" ? "this board's own documented/corrected value"
      : "suggested starting value — verify for your hardware";
    html += `<button type="button" class="inline-btn default-btn" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}" data-default="${escapeAttr(slot.spec.default)}" title="Set ${kindLabel}: ${escapeAttr(slot.spec.default)}">def</button>`;
  }
  html += `<button type="button" class="inline-btn clear-btn" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}" title="Clear (back to TBD)">✕</button>`;
  return html;
}

/* FluidNC pin attributes: :low/:high (active level) and :pu/:pd (pull
 * resistor) can be attached to any real pin reference. The base pin itself
 * (a board-derived fact) is shown read-only; these two small pickers just
 * append the optional suffixes. */
function pinWidgetHtml(slot) {
  const attrs = pinAttrs[slot.path] || { level: "", pull: "" };
  const levelOpts = [["", "—"], ["low", ":low"], ["high", ":high"]];
  const pullOpts = [["", "—"], ["pu", ":pu"], ["pd", ":pd"]];
  // I2SO pins are outputs of an external shift register, not real GPIOs --
  // they have no pull-up/pull-down capability at all, so no chip lookup
  // applies to them. Real gpio.* pins: consult the board's mcu_chip file
  // (chipGpioCaps, built in loadBoard()) for the true per-pin pullup/
  // pulldown capability -- e.g. the ESP32's own input-only pins (34-39)
  // have neither, a chip-level fact, not a board-level one (per explicit
  // user direction: this should be sourced from the chip file, not
  // restated/guessed per board).
  let supportsPull = !slot.basePin.startsWith("i2so.");
  if (supportsPull && slot.basePin.startsWith("gpio.")) {
    const num = parseInt(slot.basePin.slice(5), 10);
    const caps = chipGpioCaps[num];
    if (caps) supportsPull = !!(caps.pullup || caps.pulldown);
  }
  let html = `<span class="fixed-fact">${escapeHtml(slot.basePin)}</span>`;
  html += `<select class="attr-field${attrs.level ? " set" : ""}" data-path="${escapeAttr(slot.path)}" data-attr="level" title="Active level (:low / :high)">` +
    levelOpts.map(([v,l]) => `<option value="${v}"${attrs.level===v?" selected":""}>${l}</option>`).join("") + `</select>`;
  if (supportsPull) {
    html += `<select class="attr-field${attrs.pull ? " set" : ""}" data-path="${escapeAttr(slot.path)}" data-attr="pull" title="Pull resistor (:pu / :pd)">` +
      pullOpts.map(([v,l]) => `<option value="${v}"${attrs.pull===v?" selected":""}>${l}</option>`).join("") + `</select>`;
  }
  return html;
}

/* Build the inline-editable HTML for the <pre>: every "TBD" or "PINSLOT"
 * token in the dumped YAML text is replaced, in order, by the matching
 * widget -- editable right where it sits in the document, pre-filled if
 * already answered, so fixing a mistake is just clicking the same spot
 * again rather than hunting a separate list. */
const HOMING_SENTINEL_RE = new RegExp(`^HOMINGSELECT_(${AXES.join("|")})$`);
const SECTION_SENTINEL_RE = new RegExp(`^SECTIONSELECT_(${Object.keys(OPTIONAL_SECTIONS).join("|")})$`);

function buildInteractiveYaml(yamlText, paramSlots, pinSlots) {
  const tokens = yamlText.split(/(TBD|PINSLOT|KINSELECT|HOMINGSELECT_[a-z]+|SECTIONSELECT_[a-z_]+)/);
  let html = "";
  let pi = 0, si = 0;
  let stripLeadingColon = false;
  tokens.forEach(tok => {
    const homingMatch = tok.match(HOMING_SENTINEL_RE);
    const sectionMatch = tok.match(SECTION_SENTINEL_RE);
    if (tok === "TBD") {
      html += paramWidgetHtml(paramSlots[pi++]);
    } else if (tok === "PINSLOT") {
      html += pinWidgetHtml(pinSlots[si++]);
    } else if (tok === "KINSELECT") {
      // kinWidgetHtml() already appends its own trailing ":" as part of the
      // label -- the very next chunk of yamlText is js-yaml's own literal
      // ": " for this same key, which would otherwise duplicate it right
      // after the select's arrow. Strip exactly that one leading colon
      // from the next plain-text chunk.
      html += kinWidgetHtml();
      stripLeadingColon = true;
    } else if (homingMatch) {
      // Same KEY-replacement idea as KINSELECT (not a value-position
      // sentinel): this axis's homing entry is keyed by
      // HOMINGSELECT_<letter> in `cfg` itself (see ensureAxis()), whether
      // enabled or not, so the selector always sits exactly where the real
      // "homing:" key belongs -- a non-existent homing: section really is
      // different from an empty one, so the interactive view shouldn't
      // show homing: at all when disabled, only this selector. The
      // following literal ": " (plus a literal "null" when disabled) is
      // js-yaml's own text for this same key/value and needs stripping,
      // same reasoning as KINSELECT.
      html += homingWidgetHtml(homingMatch[1]);
      stripLeadingColon = true;
    } else if (sectionMatch) {
      // Same idea again, one level up: SECTIONSELECT_<key> is the sentinel
      // KEY for one of OPTIONAL_SECTIONS (parking/macros/oled/atc_manual),
      // planted by generateDraft() regardless of enabled state -- see
      // OPTIONAL_SECTIONS' own declaration comment.
      html += sectionWidgetHtml(sectionMatch[1]);
      stripLeadingColon = true;
    } else {
      html += escapeHtml(stripLeadingColon ? tok.replace(/^:(\s*null)?/, "") : tok);
      stripLeadingColon = false;
    }
  });
  return html;
}

/* Kinematics system selector -- lives INSIDE the generated draft itself
 * (right pane), not the left pane's resource-assignment list, since it
 * isn't a board-resource binding at all (any board can in principle host
 * any kinematic system -- see KINEMATICS_TYPES' own declaration comment).
 * Implemented the same way PINSLOT/TBD are: generateDraft() plants a
 * literal "KINSELECT" sentinel as the kinematics: block's own key (see
 * `cfg.kinematics = { KINSELECT: kt.stub() }`), which survives js-yaml's
 * dump as plain unquoted text and gets tokenized out here exactly like any
 * other sentinel, then replaced with a real <select>. Wired up alongside
 * the other #draft widget classes in generateDraft(). */
function kinWidgetHtml() {
  // Option text is each system's real cfgKey (Cartesian/CoreXY/midtbot/
  // parallel_delta/WallPlotter) -- i.e. exactly the section-name text that
  // ends up in the actual key position, not KINEMATICS_TYPES' more
  // elaborated display label (e.g. "Parallel Delta") -- so the dropdown,
  // sitting inline where a YAML key normally goes, still reads like a
  // real, valid config file rather than an elaborated UI description.
  // The ":" is baked into each option's own text (not appended after
  // </select>) so it reads "Cartesian:" BEFORE the native dropdown arrow,
  // exactly where a real YAML key's colon belongs -- a colon placed after
  // the closing </select> tag would render after the arrow instead, which
  // looks wrong (a native <select>'s arrow is always the box's last visual
  // element; nothing can be placed between the label text and the arrow
  // except by putting it inside the option text itself).
  let html = `<select class="kin-select">`;
  Object.keys(KINEMATICS_TYPES).forEach(k => {
    const cfgKey = KINEMATICS_TYPES[k].cfgKey;
    html += `<option value="${escapeAttr(k)}"${k === kinematicsType ? " selected" : ""}>${escapeHtml(cfgKey)}:</option>`;
  });
  html += `</select>`;
  return html;
}

/* Per-axis homing: presence selector -- see homingEnabled's own declaration
 * comment. Same KEY-replacement idea as kinWidgetHtml(): this axis's own
 * homing entry is keyed by HOMINGSELECT_<letter> in `cfg`/`liveCfg`
 * regardless of state (see ensureAxis()), so the selector always sits
 * exactly at the position homing:'s KEY would occupy -- when disabled, no
 * "homing:" text appears anywhere, only this selector (a non-existent
 * section really is different from an empty one). Only the enabled
 * option's text bakes in a trailing ":" (matching the real "homing:" key
 * text, before the arrow, same reasoning as kinWidgetHtml's cfgKey
 * options) -- the disabled option deliberately has none, since "No
 * homing" never becomes a real YAML key at all. */
function homingWidgetHtml(letter) {
  const enabled = !!homingEnabled[letter];
  let html = `<select class="homing-select" data-letter="${escapeAttr(letter)}">`;
  html += `<option value="false"${enabled ? "" : " selected"}>— No homing —</option>`;
  html += `<option value="true"${enabled ? " selected" : ""}>homing:</option>`;
  html += `</select>`;
  return html;
}

/* Optional-section presence selector -- see OPTIONAL_SECTIONS' own
 * declaration comment. Same pattern as homingWidgetHtml() one level up
 * (top-level key instead of a per-axis one): sectionSentinel(key) sits
 * exactly where the real section key (parking:/macros:/oled:/atc_manual:)
 * would go, so disabling it leaves no trace of that key at all. */
function sectionWidgetHtml(key) {
  const enabled = !!sectionEnabled[key];
  const def = OPTIONAL_SECTIONS[key];
  let html = `<select class="section-select" data-section="${escapeAttr(key)}">`;
  html += `<option value="false"${enabled ? "" : " selected"}>— ${escapeHtml(def.label)}: not included —</option>`;
  html += `<option value="true"${enabled ? " selected" : ""}>${escapeHtml(key)}:</option>`;
  html += `</select>`;
  return html;
}

function resourceKeyMotor(i) { return `motor:${i}`; }
function resourceKeyPin(i) { return `pin:${i}`; }
function resourceKeyExp(si, pi) { return `exp:${si}:${pi}`; }
function resourceKeyRs485(i) { return `rs485:${i}`; }
function resourceKeyExpUart(i) { return `expuart:${i}`; }
function resourceKeyI2c(i) { return `i2c:${i}`; }

/* ---------------------------------------------------------------------
 * Rendering
 * ------------------------------------------------------------------- */
async function loadBoard(id) {
  let boardText;
  try {
    boardText = await fetchYamlText(`boards/${id}.board.yaml`);
  } catch (e) {
    // #boardNote only exists in the pane's initial placeholder markup --
    // renderResources() below replaces #resourceCol's entire innerHTML on
    // every successful load, so #boardNote is gone after the first one.
    // #resourceCol itself is never replaced (it's the element renderResources()
    // writes INTO), so that's the stable place to report a load failure,
    // whether this is the very first load or a later one that failed.
    document.getElementById("resourceCol").innerHTML = `<div class="note">` +
      `Couldn't load boards/${escapeAttr(id)}.board.yaml (${escapeAttr(e.message)}). If you opened this page via a ` +
      `file:// URL, browsers block fetch() of local files -- serve this folder over HTTP instead ` +
      `(e.g. "python3 -m http.server" from a terminal here, then open http://localhost:8000/index.html).</div>`;
    return;
  }
  board = jsyaml.load(boardText);
  bindings = {};
  paramValues = {};
  pinAttrs = {};
  kinematicsType = "Cartesian";
  homingEnabled = {};
  sectionEnabled = {};
  // Build a per-GPIO-number capability lookup from this board's referenced
  // mcu_chip file (see pinWidgetHtml()'s use of chipGpioCaps) -- chip-level
  // facts (pullup/pulldown support etc.) belong here, not in the board file.
  chipGpioCaps = {};
  const chipId = board.board && board.board.mcu_chip;
  if (chipId) {
    const chipText = await fetchYamlTextOptional(`chips/${chipId}.chip.yaml`);
    if (chipText) {
      const chip = jsyaml.load(chipText);
      (chip.gpio || []).forEach(g => { chipGpioCaps[g.pin] = g; });
    }
  }
  const hotspotText = await fetchYamlTextOptional(`hotspots/${id}.hotspots.yaml`);
  hotspotData = hotspotText ? jsyaml.load(hotspotText) : null;
  computeResourcePins();
  renderResources();
  renderHotspotPane();
  wireHotspotHoverLinks();
  generateDraft();
}

/* Builds resourcePins (resourceKey -> [pin, ...]) from the board's own
 * facts -- same resourceKey*() helpers and the same section-by-section walk
 * renderResources() uses, so a resource's key here always matches the key
 * its row is rendered/bound under. Purely a physical-pin fact, independent
 * of whatever role (if any) ends up bound to a given resource. */
function computeResourcePins() {
  resourcePins = {};
  resourceLabels = {};
  (board.motor_sockets && board.motor_sockets.sockets || []).forEach((s, i) => {
    resourcePins[resourceKeyMotor(i)] = Object.values(s.pins || {});
    resourceLabels[resourceKeyMotor(i)] = s.label;
  });
  (board.generic_pins || []).forEach((p, i) => {
    resourcePins[resourceKeyPin(i)] = [p.mcu_pin];
    resourceLabels[resourceKeyPin(i)] = p.label;
  });
  (board.expansion_sockets || []).forEach((s, si) => {
    (s.pins || []).forEach((p, pi) => {
      resourcePins[resourceKeyExp(si, pi)] = [p.mcu_pin];
      // Matches the exact label string generateDraft()'s allPins walk
      // builds for this same resource (`${s.label}/${p.module_pin}`) --
      // must stay identical so a comment hint scraped from an exported
      // file's "# <label>" line matches this map's value exactly.
      resourceLabels[resourceKeyExp(si, pi)] = `${s.label}/${p.module_pin}`;
    });
  });
  (board.rs485_channels || []).forEach((ch, i) => {
    resourcePins[resourceKeyRs485(i)] = [ch.tx_pin, ch.rx_pin, ch.rts_pin].filter(Boolean);
    resourceLabels[resourceKeyRs485(i)] = ch.label;
  });
  (board.expansion_uarts || []).forEach((ex, i) => {
    resourcePins[resourceKeyExpUart(i)] = [ex.txd_pin, ex.rxd_pin].filter(Boolean);
    resourceLabels[resourceKeyExpUart(i)] = ex.label;
  });
  (board.i2c_connectors || []).forEach((ic, i) => {
    resourcePins[resourceKeyI2c(i)] = [ic.sda_pin, ic.scl_pin].filter(Boolean);
    resourceLabels[resourceKeyI2c(i)] = ic.label;
  });
}

/* GPIO conflict detection: two DIFFERENT resources sometimes share the SAME
 * physical pin on purpose (a board's own documented dual-purpose connector,
 * e.g. Corgi's gpio.4 being both a plain "5V Out (shared w/ MOSFET1)" pin
 * and a "MOSFET1" driver pin) -- only one of them can actually be used in a
 * real config. Whenever a resource gets bound to a role, its pins go into a
 * "used" list; every UNASSIGNED resource that shares a pin with something
 * already used gets its role selector(s) disabled with an "already assigned to"
 * note, so the user can't accidentally double-bind the same wire. Recomputed
 * on every binding change (called from generateDraft(), same pattern as
 * refreshHotspotStates()), so undoing the owning resource's binding
 * immediately re-enables the conflicting one again. */
function refreshGpioConflicts() {
  const usedGpios = {}; // pin -> { key, label }
  Object.keys(resourcePins).forEach(key => {
    const row = document.querySelector(`#resourceCol .row[data-resource-key="${key}"]`);
    if (!row) return;
    // Only the FIRST visible select determines assigned-state, matching
    // getRowRoleInfo()'s existing convention -- a hidden secondary select
    // (e.g. output rows' per-pin picker after switching back to Unused)
    // keeps its last value even while hidden, so checking every select
    // regardless of visibility would wrongly treat that as still assigned.
    const selects = Array.from(row.querySelectorAll("select")).filter(s => s.style.display !== "none" && s.options.length);
    const assigned = selects.length && selects[0].value !== "unused" && selects[0].value !== "";
    if (!assigned) return;
    const label = row.querySelector(".name") ? row.querySelector(".name").textContent : key;
    resourcePins[key].forEach(pin => {
      if (!usedGpios[pin]) usedGpios[pin] = { key, label };
    });
  });

  Object.keys(resourcePins).forEach(key => {
    const row = document.querySelector(`#resourceCol .row[data-resource-key="${key}"]`);
    if (!row) return;
    const allSelects = Array.from(row.querySelectorAll("select"));
    const visibleSelects = allSelects.filter(s => s.style.display !== "none" && s.options.length);
    const assigned = visibleSelects.length && visibleSelects[0].value !== "unused" && visibleSelects[0].value !== "";
    const note = row.querySelector(".conflict-note");
    if (assigned) {
      // Never disable/relabel an already-assigned resource -- conflicts are
      // only surfaced on the side that hasn't committed to anything yet.
      row.classList.remove("gpio-conflict");
      allSelects.forEach(s => { s.disabled = false; });
      if (note) note.style.display = "none";
      return;
    }
    const conflict = resourcePins[key]
      .map(pin => usedGpios[pin])
      .find(owner => owner && owner.key !== key);
    row.classList.toggle("gpio-conflict", !!conflict);
    // Disable ALL selects in the row (not just the first), including a
    // currently-hidden secondary one, so it can't be revealed mid-conflict
    // by switching primary categories.
    allSelects.forEach(s => { s.disabled = !!conflict; });
    if (note) {
      if (conflict) {
        note.textContent = `already assigned to ${conflict.label}`;
        note.title = note.textContent; // full text on hover in case it's ellipsis-truncated
        note.style.display = "flex";
      } else {
        note.style.display = "none";
      }
    }
  });
}

/* Role-uniqueness: the SAME FluidNC role (e.g. "X axis / First Motor",
 * i.e. bindings value "x:motor0") shouldn't be assignable to two different
 * resources -- two physical motor sockets both claiming to drive "X axis
 * First Motor" is never correct, same idea for e.g. two different pins both
 * set to "Digital Output 0" or both set to "Probe". Unlike GPIO conflicts
 * (a hardware fact, independent of role), this is purely about the ROLE
 * value itself being claimed elsewhere, regardless of which physical pin(s)
 * are involved.
 *
 * bindings[key] already stores exactly one canonical, directly-comparable
 * "full role" string for every row type (confirmed by reading each row
 * builder's own onchange handler): makeRow's raw select value, makeOutputRow's
 * "category" or "category:subvalue", makeInputRow's full ":"-joined leaf
 * path -- so a single claimed-values map keyed by that string covers all
 * three uniformly. What differs per row type is WHICH <option> elements
 * represent a "complete" role worth checking:
 *   - makeRow: every option IS a complete role (its own value).
 *   - makeOutputRow: only options that DON'T cascade (no secondary select,
 *     e.g. "coolant:flood") are complete on the primary select; a cascading
 *     category's completion happens on the secondary select's options
 *     instead ("<primary.value>:<secondary option value>").
 *   - makeInputRow: only the DEEPEST select's options are complete (their
 *     path segments plus every select's value strictly before them) -- by
 *     construction (see render()'s `while (node.children)` loop) that's
 *     always the LAST <select> rendered in .cascade-controls, whatever the
 *     tree's depth for that particular branch.
 * Called at the end of generateDraft(), same live-refresh pattern as
 * refreshGpioConflicts()/refreshHotspotStates(). */

/* Enumerates every leaf path reachable from `node` (DFS, tree key order),
 * each prefixed with `segs`. Shared by refreshRoleUniqueness() (to check
 * whether an entire BRANCH -- not just a single leaf -- is exhausted, so it
 * can gray the branch option out too, not just leaves) and makeInputRow's
 * own firstLeafPathFrom() (auto-fill). Hoisted to top-level scope since both
 * need it and neither owns the tree data exclusively. */
function enumerateLeafPaths(node, segs) {
  if (!node.children) return [segs];
  let out = [];
  Object.keys(node.children).forEach(k => out = out.concat(enumerateLeafPaths(node.children[k], segs.concat([k]))));
  return out;
}

function refreshRoleUniqueness() {
  const claimed = {}; // full role value string -> { key, label }
  Object.keys(resourcePins).forEach(key => {
    const val = bindings[key];
    if (!val || val === "unused") return;
    const row = document.querySelector(`#resourceCol .row[data-resource-key="${key}"]`);
    const label = row && row.querySelector(".name") ? row.querySelector(".name").textContent : key;
    claimed[val] = { key, label };
  });

  function applyDisable(opt, fullValue, ownKey) {
    if (opt.value === "unused") { opt.disabled = false; return; }
    const owner = claimed[fullValue];
    opt.disabled = !!owner && owner.key !== ownKey;
  }

  Object.keys(resourcePins).forEach(key => {
    const row = document.querySelector(`#resourceCol .row[data-resource-key="${key}"]`);
    if (!row) return;

    const plainSel = row.querySelector(".ctrl-wrap select");
    if (plainSel) {
      Array.from(plainSel.options).forEach(opt => applyDisable(opt, opt.value, key));
      return;
    }

    const outputControls = row.querySelector(".output-controls");
    if (outputControls) {
      const [primary, secondary] = outputControls.querySelectorAll("select");
      if (primary) {
        Array.from(primary.options).forEach(opt => {
          if (opt.value === "unused") { opt.disabled = false; return; }
          const copts = cascadeOptionsFor(opt.value);
          if (copts) {
            // A cascading category (spindle:*, digital_output, ...) has no
            // single "complete" value of its own -- gray it out only if
            // EVERY one of its secondary options is already claimed by a
            // DIFFERENT resource (nothing left to pick under it), same
            // "gray the whole exhausted branch" idea as cascade rows below.
            const exhausted = copts.every(([v]) => {
              const owner = claimed[`${opt.value}:${v}`];
              return owner && owner.key !== key;
            });
            opt.disabled = exhausted;
            return;
          }
          applyDisable(opt, opt.value, key);
        });
      }
      if (secondary && secondary.style.display !== "none") {
        Array.from(secondary.options).forEach(opt => applyDisable(opt, `${primary.value}:${opt.value}`, key));
      }
      return;
    }

    const cascadeControls = row.querySelector(".cascade-controls");
    if (cascadeControls) {
      const selects = Array.from(cascadeControls.querySelectorAll("select"));
      const tree = row._cascadeTree;
      if (!selects.length || !tree) return;
      // Walk level by level (top select's options are the tree's own
      // top-level keys, so start with a synthetic node whose .children IS
      // the tree). At each select, an option whose node is a LEAF (no
      // .children) gets the usual exact-role check; an option whose node is
      // a BRANCH gets grayed out only if EVERY leaf reachable under it is
      // already claimed by a DIFFERENT resource -- so an exhausted axis
      // (e.g. both motor0 and motor1 already taken) is unselectable at the
      // TOP level too, not just its individual leaves. Descend into
      // whichever child the select's CURRENT value points to, to give the
      // next select (if any) the right context.
      let node = { children: tree };
